# cc65 linker config for APPLE-1 LOGO for TMS9918
# -----------------------------------------------------------------
# Target: 8 KB DRAM Apple-1 (Replica-1 / NTI 8K expansion).
# Memory layout (0000-1FFF = 8 KB DRAM, plus Woz Monitor ROM):
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  line buffer + parser scratch (LINEBUF, 128 B)
#   $0280-$1B7F  program code + data (CODE, 6400 B)
#   $1B80-$1FFF  user procedure storage + save buffer (PROC, 1152 B)
#
# PROC layout (V1.5): 8 proc slots of 128 B each = 1024 B for proc_table,
# + 60-byte save buffer for line_buf during proc invocation
# + 1 saved line_idx + 14 B param frame + 3 B (def_mode, cur_proc_lo/hi)
# + ~50 B padding = 1152 B.
# Slot V1.5: 4 name + 1 n_params + 8 params (2 x 4) + 1 body_len + 114 body.

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    LBUF:  start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $0280, size = $1900, type = ro, define = yes, file = %O;
    PROC:  start = $1B80, size = $0480, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    LINEBUF:  load = LBUF, type = bss;
    CODE:     load = CODE, type = ro;
    PROCBSS:  load = PROC, type = bss;
}
