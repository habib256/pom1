# cc65 linker config for APPLE-1 LOGO for TMS9918
# -----------------------------------------------------------------
# Target: 8 KB DRAM Apple-1 (Replica-1 / NTI 8K expansion).
# Memory layout (0000-1FFF = 8 KB DRAM, plus Woz Monitor ROM):
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  line buffer + parser scratch (LINEBUF, 128 B)
#   $0280-$1EBF  program code + data (CODE, 7232 B)
#   $1EC0-$1FFF  user procedure storage + save buffer (PROC, 320 B)
#
# PROC layout: 4 proc slots (4 x 64 B = 256 B) + 60-byte save buffer for
# the caller's line_buf during proc invocation + 1 saved line_idx +
# 3 bytes padding = 320 B. The save buffer lets a procedure run while
# preserving the outer line_buf state so REPEAT can re-read its body.

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    LBUF:  start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $0280, size = $1C40, type = ro, define = yes, file = %O;
    PROC:  start = $1EC0, size = $0140, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    LINEBUF:  load = LBUF, type = bss;
    CODE:     load = CODE, type = ro;
    PROCBSS:  load = PROC, type = bss;
}
