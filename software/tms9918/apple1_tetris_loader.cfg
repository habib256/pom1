# cc65 linker config for the CodeTank upper-bank Tetris launcher.
# The bootstrap occupies the first 128 B of the upper half ($4000-$407F);
# the build script slots the raw Tetris payload right after it at $4080.

MEMORY {
    CODE: start = $4000, size = $0080, type = ro, define = yes, file = %O;
}

SEGMENTS {
    CODE: load = CODE, type = ro;
}
