# cc65 linker config for TMS_Life in the fifth slot of the CodeTank
# lower bank. Code runs in place from $7A00.
#
#   $0000-$0018  ZP scalars (25 B used - ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$0FFF  free RAM
#   $1000-$1373  grid_a       (884 B, absolute - declared in the .asm)
#   $1400-$1773  grid_b       (884 B, absolute - declared in the .asm)
#   $4000-$79FF  CodeTank menu + Galaga + Sokoban + Snake (other configs)
#   $7A00-$7FFF  Life code (CODE segment, this config) - 1 536 B slot
#
# Life's two grids live at fixed absolute addresses ($1000/$1400 in
# the .asm via `grid_a := $1000`) so they never appear in the linker
# config; ld65 only sees CODE here. The grids deliberately sit below
# $2000 to dodge the GEN2 HGR framebuffer ($2000-$3FFF) and the
# CodeTank ROM window ($4000-$7FFF) on the same bus.

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $7A00, size = $0600, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
