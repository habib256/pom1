# cc65 linker config for TMS_Maze3D on Apple 1 + TMS9918 (8 KB DRAM)
# -----------------------------------------------------------------
#
#   $0000-$00FF  ZP scalars (extended ZP, ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed at runtime)
#   $0280-$1AFF  CODE segment (program + ROM tables ~6 KB)
#   $1B00-$1B4C  GRID    (77 bytes - maze cells, 11x7)
#   $1B50-$1B9C  STACK   (77 bytes - DFS backtracker stack)
#   $1BA0-$1BFF  MOBS    (96 bytes - monsters table, 8 mobs * 12 bytes)
#   $1C00-$1FFF  free / scratch
#
# All long-running game state lives in extended ZP. The off-board
# segments are bss (zero-init) so they don't bloat the output binary.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $0280, size = $1880, type = ro, define = yes, file = %O;
    GRID:  start = $1B00, size = $0050, type = rw, define = yes;
    STK:   start = $1B50, size = $0050, type = rw, define = yes;
    MOBS:  start = $1BA0, size = $0060, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    GRIDSEG:  load = GRID, type = bss;
    STKSEG:   load = STK,  type = bss;
    MOBSEG:   load = MOBS, type = bss;
}
