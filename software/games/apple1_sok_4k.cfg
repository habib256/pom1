# cc65 linker config for Sokoban on a stock 4 KB Apple 1
# -----------------------------------------------------------------
# Memory layout (4 KB DRAM at $0000-$0FFF + Woz Monitor ROM):
#
#   $0000-$001F  Sokoban zero-page scalars (ZP segment)
#   $0020-$009F  LEVEL_BUF  (128 B, ZP-indexed — LEVELBUF segment)
#   $00A0-$00FF  free
#   $0100-$01FF  6502 stack (untouched)
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed while game runs)
#   $0280-$0EFF  program code + data (3 200 B — CODE segment)
#   $0F00-$0FBF  STATE_GRID (192 B, 16x12, absolute-indexed — STATEGRID segment)
#   $0FC0-$0FFF  free
#
# LEVELBUF is `type = zp` so ca65 emits `LDA LEVEL_BUF,X` as zp,X (2 bytes).
# STATEGRID is `type = bss` so ca65 emits `LDA STATE_GRID,X` as abs,X (3 bytes).
# Both are uninitialised at load time and filled at runtime.

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF: start = $0020, size = $0080, type = rw, define = yes;
    CODE:   start = $0280, size = $0C80, type = ro, define = yes, file = %O;
    STGRID: start = $0F00, size = $00C0, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LEVELBUF:  load = LVLBUF, type = zp;
    CODE:      load = CODE,   type = ro;
    STATEGRID: load = STGRID, type = bss;
}
