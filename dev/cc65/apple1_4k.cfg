# Apple 1 linker config with 4 KB code segment
# Suitable for mid-size text-mode programs that need more than
# the standard 3328-byte CODE budget of apple1.cfg but no HGR RAM.
#
# Memory layout:
#   $0000-$0022  Zero page (35 bytes)
#   $0280-$127F  Code + data (4096 bytes, output file)
#   $4000+       Runtime RAM (hardcoded page-aligned addresses)

MEMORY {
    ZP:     start = $0000, size = $0023, type = rw, define = yes;
    CODE:   start = $0280, size = $1000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
