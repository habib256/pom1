# cc65 linker config for stock Apple 1 with 8 KB DRAM (no expansion cards)
# -----------------------------------------------------------------------------
# Same memory map as apple1.cfg / apple1_4k.cfg but with CODE stretched to
# fill the entire 8 KB DRAM. For text-mode programs that overflow the
# 3 328 B / 4 096 B budgets of the smaller configs.
#
# No graphics-card reservation: $2000-$3FFF (where GEN2 HGR or A1-IO/RTC
# would land) is unused — programs targeting this config assume a stock
# 8 KB Apple-1 with NO expansion. If you plug GEN2 HGR, use apple1_gen2.cfg
# instead (same CODE size but the HGR framebuffer at $2000-$3FFF is
# reserved RAM, not code space).
#
# Memory layout:
#   $0000-$0022  Zero page (35 bytes — cc65 ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer (reclaimed at runtime)
#   $0280-$1FFF  Code + data (7 552 bytes, output file)

MEMORY {
    ZP:     start = $0000, size = $0023, type = rw, define = yes;
    CODE:   start = $0280, size = $1D80, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
