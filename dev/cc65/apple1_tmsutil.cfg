# Apple-1 linker config for the small TMS9918 microSD utilities
# (TMSLOAD / TMSLOADM / DIAPO). Code loads at $0300 — the address the SD CARD OS
# `@R`/`8000R` path jumps to (matches the `#060300` filename tag). Kept strictly
# below $0800 so TMSLOAD's copy source (a 16 KB image the SD OS `@L`-drops at
# $0800) never overlaps the utility itself.
#
#   $0010-$001F  Zero page scratch (16 bytes; avoids Wozmon's $24-$2B)
#   $0300-$07FF  Code (output file; utilities are only a few hundred bytes)

MEMORY {
    ZP:     start = $0010, size = $0010, type = rw, define = yes;
    CODE:   start = $0300, size = $0500, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp,  optional = yes;
    CODE:     load = CODE, type = ro;
}
