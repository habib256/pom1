# Default cc65 linker config for P-LAB CodeTank ROM cards
# --------------------------------------------------------
# Standalone CodeTank: code runs in place from the $4000-$7FFF ROM window
# (16 KB single ROM image, 28C256 jumper = lower half).
#
# Memory layout:
#   $0000-$00FF  Extended zero page (256 B, ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer
#   $0280-$0FFF  Free RAM (game state, BSS, etc.)
#   $4000-$7FFF  CodeTank ROM window — CODE segment runs in place
#
# Entry point: 4000R from the Woz Monitor (the first label inside .code
# lands at $4000 verbatim — typically a `main:` symbol).
#
# All `.byte` data tables and `.rodata` live inside CODE so they're
# served straight from ROM. The 6502 fetches operands from ROM at $4000
# without issue; only writes need RAM and must hit ZP / $0280-$0FFF.
#
# For multi-game ROM bank slots ($5E00, $7100, etc.) or 8 KB jumper
# (lower half = $4000-$5FFF only), keep a project-local copy and tweak
# CODE start/size — leave this directory pristine for the canonical
# 16 KB layout.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    RAM:   start = $0280, size = $0D80, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    RODATA:   load = CODE, type = ro;
    # Optional BSS in the documented free-RAM window above: every standard
    # TMS sketch declares `.segment "BSS"` for its state, and the DevBench
    # links pasted sketches against THIS canonical cfg — without a mapping,
    # ld65 died with "Missing memory area assignment for segment 'BSS'".
    # `optional = yes` keeps BSS-less programs linking unchanged.
    BSS:      load = RAM,  type = bss, define = yes, optional = yes;
}
