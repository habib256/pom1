# cc65 C config for Uncle Bernie's GEN2 HGR on the Apple-1 (preset 11, 48 KB).
# Code + C stack live in $6000-$BEFF, ABOVE the GEN2 framebuffers ($2000 HGR
# page 1 / $4000 page 2) and text/lores pages ($0400/$0800). Run: 6000R
FEATURES {
    STARTADDRESS: default = $6000;
    CONDES: type=constructor, label=__CONSTRUCTOR_TABLE__, count=__CONSTRUCTOR_COUNT__, segment=ONCE;
    CONDES: type=destructor,  label=__DESTRUCTOR_TABLE__,  count=__DESTRUCTOR_COUNT__,  segment=RODATA;
    CONDES: type=interruptor, label=__INTERRUPTOR_TABLE__, count=__INTERRUPTOR_COUNT__, segment=RODATA, import=__CALLIRQ__;
}
SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0800;
    __STACKSTART__: type = weak, value = $BF00;
    __ZPSTART__:    type = weak, value = $0000;
}
MEMORY {
    ZP:  start = $0000, size = $0100, type = rw, define = yes;
    # Otherwise-idle user RAM below the HIRES framebuffers ($2000-$5FFF). A
    # HIRES-only GEN2 program (the norm) leaves $0C00-$1FFF empty, so one that
    # is tight on the $6000-$BEFF budget can park big *uninitialised* arrays
    # here via  #pragma bss-name(push,"LOWBSS")  — the LOWBSS segment below.
    # Purely additive: programs that don't opt in are byte-for-byte unaffected.
    # crt0 zeroes only the main BSS, NOT LOWBSS — put here only arrays your own
    # code fully initialises before first read (e.g. runtime-built sprite tables).
    LOWRAM: start = $0C00, size = $1400, type = rw, define = yes;
    RAM: start = $6000, size = $5F00, type = rw, file = %O, define = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    LOWBSS:   load = LOWRAM, type = bss, optional = yes, define = yes;
    STARTUP:  load = RAM,    type = ro,  define = yes;
    LOWCODE:  load = RAM,    type = ro,  optional = yes;
    INIT:     load = RAM,    type = ro,  optional = yes;
    ONCE:     load = RAM,    type = ro,  optional = yes;
    CODE:     load = RAM,    type = ro;
    RODATA:   load = RAM,    type = ro;
    DATA:     load = RAM,    type = rw,  define = yes;
    BSS:      load = RAM,    type = bss, define = yes;
}
