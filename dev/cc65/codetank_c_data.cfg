# cc65 linker — POM1 CodeTank + TMS9918 (preset 9), crt0_pom1 variant
#
# Same memory layout as dev/lib/tms9918c/cc65/codetank_c.cfg:
#   ROM: code + const + DATA load image  $4000-$7FFF
#   RAM low $0280-$0FFF: .data run + cc65 C stack (top at $1000)
#   RAM high $E000-$EFFF: .bss (upper dual-bank window, "BASIC" area free)
#
# THE DIFFERENCE IS THE STARTUP CONTRACT, not the layout. This variant is for
# programs linked with dev/cc65/crt0_pom1.s FIRST on the cl65 line — that
# startup calls `copydata`, so **C initializers on globals are honoured**
# (`unsigned char g = 0x5A;` really reads 0x5A at run time). The classic pair
# (codetank_c.cfg + none.lib's stock crt0) does NOT: its crt0 never calls
# copydata, so on this load != run layout every initialized global silently
# holds power-on garbage — the "-t none DATA trap" (dev/lib/README.md). The
# burn-validated CodeTank ROM builds keep the classic pair + BSS conventions;
# new code should link crt0_pom1.s with THIS cfg:
#
#   cl65 -t none -Oirs -C dev/cc65/codetank_c_data.cfg \
#        dev/cc65/crt0_pom1.s main.c ... -o main.bin
#
# What crt0_pom1 needs from the cfg (all present here, and kept explicit so a
# copy-paste survives edits):
#   - STARTUP segment FIRST in ROM (the $4000 entry point is the crt0);
#   - DATA `define = yes` -> __DATA_LOAD__/__DATA_RUN__/__DATA_SIZE__ for
#     copydata (codetank_c.cfg already defines them; only the crt0 was
#     missing the call);
#   - BSS `define = yes` -> __BSS_RUN__/__BSS_SIZE__ for zerobss;
#   - __STACKSTART__ in SYMBOLS.
#
# Boot: Wozmon 4000R

FEATURES {
    STARTADDRESS: default = $4000;
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}

SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0200;
    __STACKSTART__: type = weak, value = $1000;
    __ZPSTART__:    type = weak, value = $0000;
}

MEMORY {
    ZP:     start = $0000, size = $0100, type = rw, define = yes;
    RAM_LO: start = $0280, size = $0D80, type = rw, define = yes;
    RAM_HI: start = $E000, size = $1000, type = rw, define = yes;
    ROM:    start = $4000, size = $4000, type = ro, file = %O, fill = yes, fillval = $FF, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    STARTUP:  load = ROM,    type = ro,  define = yes;
    LOWCODE:  load = ROM,    type = ro,  optional = yes;
    INIT:     load = ROM,    type = ro,  optional = yes;
    ONCE:     load = ROM,    type = ro,  optional = yes;
    CODE:     load = ROM,    type = ro;
    RODATA:   load = ROM,    type = ro;
    DATA:     load = ROM, run = RAM_LO, type = rw, define = yes;
    BSS:      load = RAM_HI, type = bss, define = yes;
}
