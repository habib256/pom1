# cc65 linker config for Apple 1 + GEN2 Color Graphics Card
#
# Target: Parmigiani 8 KB dual-bank Apple-1 (4 KB at $0000-$0FFF + 4 KB at
# $E000-$EFFF) plus the Uncle Bernie GEN2 HGR card. POM1 preset 8.
#
# Layout philosophy: "code en haut, le reste en bas" — the program code lives
# in the high bank ($E000-$EFFF) where the original Apple-1 mapped Integer
# BASIC ROM (so the load address feels familiar to anyone who has typed
# E000R). The low bank stays free for stack ($0100-$01FF), Wozmon input
# buffer ($0200-$027F) and any project's static data / BSS that won't fit
# in the 4 KB high window. The middle window $1000-$1FFF is the dual-bank
# gap (no RAM on a stock Parmigiani card) and the GEN2 card claims
# $2000-$3FFF for its 8 KB framebuffer.
#
# Memory map:
#   $0000-$003F  ZP        Zero page (64 B)
#   $0100-$01FF  -         6502 stack
#   $0200-$027F  -         Wozmon keyboard input buffer
#   $0280-$0FFF  -         free for project use (stack, scratch, custom split)
#   $1000-$1FFF  -         dual-bank gap (no RAM)
#   $2000-$3FFF  -         GEN2 HGR framebuffer (RESERVED, written via STA)
#   $E000-$EFFF  CODE      program code + .byte tables (4 KB, file = %O)
#
# Single-bank programs (≤ 4 KB) only use CODE: the .bin starts at $E000 and
# Wozmon launches with `E000R`. emit_woz.py callers pass start_addr=0xE000.
#
# Programs that need more than 4 KB should NOT add a DATA region here —
# instead provide their own cfg with a split-bank file = "%O.lo" / "%O.hi"
# pair (matches dev/projects/hgr_chess/apple1_chess_hgr.cfg and
# dev/projects/games_sokoban/apple1_sok_hgr.cfg). Mixing both layouts in
# one cfg confuses ld65 (it writes the second region's bytes after the
# first into a single binary, leaving an enormous gap).

MEMORY {
    ZP:   start = $0000, size = $0040, type = rw, define = yes;
    # $0100-$01FF  6502 stack
    # $0200-$027F  Wozmon keyboard input buffer
    # $0280-$0FFF  free (use a custom split cfg if you need bytes here)
    # $1000-$1FFF  dual-bank gap (no RAM on stock Parmigiani)
    # $2000-$3FFF  GEN2 HGR framebuffer (writes go straight into card SRAM)
    CODE: start = $E000, size = $1000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
