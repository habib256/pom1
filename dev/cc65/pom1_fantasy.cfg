# cc65 linker config for XXL programs in POM1 Multiplexing Fantasy
# -----------------------------------------------------------------
# Target: POM1 presets 12 (P-LAB Multiplexing Fantasy) and 14 (POM1
# Multiplexing Fantasy 2026). 64 KB RAM, no real-Apple-1 portability.
#
# A program built with this cfg WILL NOT load on:
#   - Stock 4 KB / 8 KB Apple-1 (CODE overflows DRAM)
#   - Any preset with Applesoft Lite ROM plugged at $6000-$7FFF
#   - Any preset with SD CARD OS ROM plugged at $8000-$9FFF
#   - GEN2 HGR (steals $2000-$3FFF)
#   - CodeTank / Juke-Box / CFFA1 (fight for $4000-$BFFF)
#
# Designed for: programs that genuinely need 32 KB+ — large look-up
# tables, full-frame bitmap caches, embedded music modules, etc.
#
# Required Fantasy state (Hardware menu or CLI flags):
#   - Applesoft Lite UNPLUGGED        (it normally claims $6000-$7FFF)
#   - SD CARD OS UNPLUGGED            (--disable microsd, claims $8000-$9FFF)
#   - GEN2 HGR UNPLUGGED              (no framebuffer reservation needed)
#   - No Juke-Box / CFFA1 / CodeTank
#   - Optional: keep TMS9918 / A1-SID / Wi-Fi / Terminal — they only
#     touch $C000-$CFFF I/O which is outside the linker regions.
#
# Memory map (Fantasy 64 KB with above ROMs unplugged):
#   $0000-$007F  Zero page (128 B — generous for big projects)
#   $0100-$01FF  6502 stack
#   $0200-$02FF  Wozmon kbd input buffer (free for runtime use)
#   $0300-$82FF  CODE / DATA / RODATA — 32 768 B output file
#   $8300-$9FFF  free RAM (~7.25 KB scratch, not in linker regions)
#   $A000-$BFFF  BASIC_RAM segment — 8 KB BSS region, NOT loaded from
#                                    the binary (program must init it
#                                    if it expects zeros). The name
#                                    is a nod to the area where Apple-1
#                                    Integer BASIC and Applesoft Lite
#                                    traditionally store user variables
#                                    — re-purposed here for any
#                                    runtime-zeroed scratch area too
#                                    big to fit in the CODE budget.
#   $C000-$CFFF  I/O — PIA aliases, ACI ROM, A1-SID, TMS9918, GT-6144
#   $D000-$D7FF  PIA aliases (every $D0xx mirrors $D010-$D012)
#   $D800-$DFFF  free RAM (2 KB)
#   $E000-$EFFF  Integer BASIC ROM (read-only)
#   $F000-$FEFF  free RAM (3.75 KB)
#   $FF00-$FFFF  Wozmon ROM
#
# Run pattern from POM1:
#   1. Load preset 9 (default Fantasy — 64 KB RAM, Applesoft Lite ON,
#      microSD ON).
#   2. Hardware menu → toggle Applesoft Lite OFF, microSD OFF.
#   3. File → Load Memory → select your project's .bin or .txt.
#   4. Wozmon `\` prompt → type `300R`.
#
# (At 1 MHz native, typing a 32 KB Woz-hex .txt by hand would take
# 4-5 minutes. ALWAYS use File > Load Memory for binaries this large.)
#
# Why split CODE and BASIC_RAM?
#   - The Wozmon `<addr>R` loader expects a single contiguous range, so
#     the actual program image (code + initialized data) must live in
#     ONE continuous file. BASIC_RAM lives ABOVE the ROM holes and is
#     reached via absolute pointers from CODE — it's not in the .bin.
#   - This mirrors how cc65's standard libc setup works: BSS gets its
#     own region, programs zero it (or trust the runtime to do so) at
#     boot. With raw ca65 (no cc65 runtime) the program is on its own
#     for clearing BASIC_RAM at startup.

MEMORY {
    ZP:        start = $0000, size = $0080, type = rw, define = yes;
    CODE:      start = $0300, size = $8000, type = ro, define = yes, file = %O;
    BASIC_RAM: start = $A000, size = $2000, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,        type = zp;
    CODE:     load = CODE,      type = ro;
    DATA:     load = CODE,      type = ro;
    RODATA:   load = CODE,      type = ro;
    BSS:      load = BASIC_RAM, type = bss, define = yes;
}
