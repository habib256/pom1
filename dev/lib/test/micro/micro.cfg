# micro.cfg — shared ld65 layout for dev/lib unit-level micro-tests
# (dev/lib/test/micro/*.s, run by tools/test_lib_micro.py).
#
# Target machine: any 8 KB dual-bank preset (RAM $0000-$0FFF + $E000-$EFFF);
# the harness defaults to preset 1 (Apple-1 TMS9918 Development Bench).
#
#   $0000-$00FF  ZEROPAGE (driver + lib .exportzp slots)
#   $0100-$01FF  6502 stack
#   $0300-$0DFF  CODE + RODATA (loaded via --load 0300:test.bin, entered 0300)
#   $0E00-$0EFF  BSS (lib scratch: sprite_triangle tri_*, shadowcast map/vis…)
#   $0F00-$0F7F  RESULT MAILBOX — never allocated by ld65. Drivers write raw
#                absolute bytes here ($0F00 = magic $A5 written LAST, results
#                from $0F01); the harness reads them back out of a POM1
#                --snapshot-save MEM section. Keep BSS under $0F00.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    MAIN:  start = $0300, size = $0B00, type = rw, define = yes, file = %O;
    RAMHI: start = $0E00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,    type = zp;
    # ENTRY is placed first in MAIN, so a driver that textually .include's a
    # lib (whose code lands in CODE) can still own the $0300 entry point:
    # put the driver's main in `.segment "ENTRY"`.
    ENTRY:    load = MAIN,  type = rw,  optional = yes;
    CODE:     load = MAIN,  type = rw;
    RODATA:   load = MAIN,  type = ro,  optional = yes;
    BSS:      load = RAMHI, type = bss, optional = yes, define = yes;
}
