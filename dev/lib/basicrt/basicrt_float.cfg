# Link config for the standalone binary32 float runtime (basicrt_float.s), used by
# the basic_float_runtime test and (later) the native compiler's FP phase. Code at
# $0300; the float working registers occupy zero page $10..$BF.
MEMORY {
    ZP:   start = $0010, size = $00B0, type = rw, define = yes;
    CODE: start = $0300, size = $1D00, type = ro, define = yes, file = %O;
}
SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
