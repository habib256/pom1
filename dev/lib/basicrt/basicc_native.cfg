# Linker config for BasicNativeCompiler output (integer phase, standalone).
#
# A compiled BASIC program + its runtime (basicrt_<card>.s) link into a bare
# 6502 image that runs with NO Applesoft interpreter -- only the graphics card.
#
#   $0000-$00FF  ZP        runtime + compiler vars/temps (zero page; we own it)
#   $0100-$01FF  -         6502 stack
#   $0200-$02FF  BSS       runtime BSS (e.g. TMS plot_mode); set before use
#   $0300-$1FFF  MAIN      program code + runtime + rodata (file = %O)
#   $2000-$3FFF  -         GEN2 HGR framebuffer (TMS9918 keeps pixels in VRAM)
#
# basic_main is emitted first in CODE, so the image entry == MAIN start ($0300).
# All BASIC variables/temporaries live in ZERO PAGE (the standalone machine has no
# Applesoft to share it with) -- ld65 errors clearly if a huge program overflows.
# MAIN runs right up to the GEN2 framebuffer ($2000); BSS sits in the otherwise
# free $0200 page so code gets the full $0300-$1FFF window (7424 bytes).

MEMORY {
    ZP:   start = $0000, size = $0100, type = rw, define = yes;
    BSS:  start = $0200, size = $0100, type = rw, define = yes;
    MAIN: start = $0300, size = $1D00, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro,  optional = yes;
    BSS:      load = BSS,  type = bss, optional = yes;
}
