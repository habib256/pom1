# Linker config for BasicNativeCompiler output -- GEN2 HGR card, LO-RES programs.
#
# Identical to basicc_native.cfg EXCEPT the program image loads at $0C00 instead of
# $0300. GEN2 lo-res uses the Apple-II text/lo-res PAGE 2 framebuffer at $0800-$0BFF
# (the video scanner can only display $0400 or $0800), so a program loaded at $0300
# that grows past $0800 would overwrite its own code/runtime the moment GR clears or
# PLOT paints page 2. Loading at $0C00 keeps the whole $0400-$0BFF lo-res region clear
# of the image, so any lo-res program up to ~5 KB ($0C00-$1FFF) runs intact. HGR
# programs keep the full $0300-$1FFF window (basicc_native.cfg); only lo-res pays the
# $0C00 base. The TMS9918 keeps pixels in VRAM, so it never needs this -- it stays
# at $0300.
#
#   $0000-$00FF  ZP        runtime + compiler vars/temps
#   $0200-$02FF  BSS       runtime BSS
#   $0400-$0BFF  -         lo-res page 1 ($0400) + page 2 framebuffer ($0800), kept free
#   $0C00-$1FFF  MAIN      program code + runtime + rodata (file = %O)
#   $2000-$3FFF  -         GEN2 HGR framebuffer

MEMORY {
    ZP:   start = $0000, size = $0100, type = rw, define = yes;
    BSS:  start = $0200, size = $0100, type = rw, define = yes;
    MAIN: start = $0C00, size = $1400, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = MAIN, type = ro;
    RODATA:   load = MAIN, type = ro,  optional = yes;
    BSS:      load = BSS,  type = bss, optional = yes;
}
