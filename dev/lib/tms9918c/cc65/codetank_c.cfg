# cc65 linker — POM1 CodeTank + TMS9918 (preset 9) only
# ROM: code + const + DATA load image  $4000-$7FFF
# RAM low $0280-$0FFF: .data run + cc65 C stack (top at $1000)
# RAM high $E000-$EFFF: .bss (zone haute dual-bank, « BASIC » libre)
#
# Boot: Wozmon 4000R

FEATURES {
    STARTADDRESS: default = $4000;
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}

SYMBOLS {
    __STACKSIZE__:  type = weak, value = $0200;
    __STACKSTART__: type = weak, value = $1000;
    __ZPSTART__:    type = weak, value = $0000;
}

MEMORY {
    ZP:     start = $0000, size = $0100, type = rw, define = yes;
    RAM_LO: start = $0280, size = $0D80, type = rw, define = yes;
    RAM_HI: start = $E000, size = $1000, type = rw, define = yes;
    ROM:    start = $4000, size = $4000, type = ro, file = %O, fill = yes, fillval = $FF, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    STARTUP:  load = ROM,    type = ro,  define = yes;
    LOWCODE:  load = ROM,    type = ro,  optional = yes;
    INIT:     load = ROM,    type = ro,  optional = yes;
    ONCE:     load = ROM,    type = ro,  optional = yes;
    CODE:     load = ROM,    type = ro;
    RODATA:   load = ROM,    type = ro;
    DATA:     load = ROM, run = RAM_LO, type = rw, define = yes;
    BSS:      load = RAM_HI, type = bss, define = yes;
}
