# zp_layout.cfg — minimal ld65 layout for the zp.inc slot-pool pin.
# ZEROPAGE deliberately starts at $0000 so zp.inc's first slot (`tmp`) resolves
# to $00 and the link-time .assert chain in zp_layout_probe.s checks the exact
# $00-$07 contract. Not a runnable image — the link is the test.
MEMORY {
    ZP:   start = $0000, size = $0100, type = rw, define = yes;
    MAIN: start = $0300, size = $0100, type = rw, file = %O;
}
SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = MAIN, type = rw;
}
