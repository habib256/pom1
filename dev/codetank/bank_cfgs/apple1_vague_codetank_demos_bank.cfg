# cc65 linker config for TMS_Vague in the Codetank_DEMOS.rom lower-bank
# layout. Vague occupies the fifth slot of the lower 16 kB bank,
# $5A00-$5FFF (1 536 B slot, ~1 052 B used). The DEMOS lower menu at
# $4000 JMPs here.
#
# ZP / BSS placement copied from the standalone CodeTank cfg
# (sketchs/tms9918/demo_vague/apple1_vague_codetank.cfg). BSS overlaps
# the other DEMOS programs' BSS on purpose — only one runs at a time
# (ESC exits to Wozmon; re-enter with 4000R).
#
#   $0000-$001F  ZP scalars (RAM)
#   $0100-$01FF  6502 stack
#   $0F80-$0FFF  BSS (wave_y_buf / tile_buf, dual-bank low RAM)
#   $4000-$41FF  DEMOS lower menu (separate config)
#   $4200-$49FF  Life    (separate config)
#   $4A00-$51FF  Mandel  (separate config)
#   $5200-$59FF  Plasma  (separate config)
#   $5A00-$5FFF  Vague code (CODE segment, this config — 1 536 B slot)
#   $6000-$7FFF  Nyan    (separate config)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $5A00, size = $0600, type = ro, define = yes, file = %O;
    BSS:   start = $0F80, size = $0080, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
