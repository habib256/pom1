# cc65 linker config for TMS_Nyan_CodeTank in the Codetank_DEMOS.rom
# lower-bank layout. Nyan occupies the last slot of the lower 16 kB bank,
# $6000-$7FFF (8 192 B slot, ~7 265 B used: 12 RLE-compressed frames +
# decoder + Mode III init). The DEMOS lower menu at $4000 JMPs here.
#
# Derived from the full-bank sketchs/tms9918/demo_nyan_cat/
# apple1_nyan_codetank.cfg (start $4000, size $4000); same ZP window.
#
#   $0000-$007F  Zero page (host Apple-1 RAM)
#   $0100-$01FF  6502 stack (host RAM)
#   $4000-$41FF  DEMOS lower menu (separate config)
#   $4200-$49FF  Life    (separate config)
#   $4A00-$51FF  Mandel  (separate config)
#   $5200-$59FF  Plasma  (separate config)
#   $5A00-$5FFF  Vague   (separate config)
#   $6000-$7FFF  Nyan code + RLE data (CODE segment, this config)

MEMORY {
    ZP:    start = $0000, size = $0080, type = rw, define = yes;
    CODE:  start = $6000, size = $2000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
