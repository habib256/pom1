# cc65 linker config for the CodeTank DEMOS lower-bank menu — lives at
# $4000-$41FF (512 B reserved; the 5-entry prompt outgrows the 256 B the
# 3-entry menus use). No RAM use; the menu only touches $D010/$D011/$D012
# (Apple-1 PIA) and the JMP target.

MEMORY {
    CODE: start = $4000, size = $0200, type = ro, define = yes, file = %O;
}

SEGMENTS {
    CODE: load = CODE, type = ro;
}
