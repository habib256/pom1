# cc65 linker config for the CodeTank GAME6 menu + ROM->RAM packer —
# lives at $4000-$41FF (512 B: the loader + the generated per-program
# segment table + menu text need more than the classic 256 B menus).
# RAM use: 10 B of loader ZP scratch at $E0-$E9 (:= absolutes, no ZP
# segment), dead the instant the launched program starts.

MEMORY {
    CODE: start = $4000, size = $0200, type = ro, define = yes, file = %O;
}

SEGMENTS {
    CODE: load = CODE, type = ro;
}
