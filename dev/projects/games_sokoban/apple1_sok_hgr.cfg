# cc65 linker config for HGR Sokoban on an Apple 1 + GEN2 card
# -----------------------------------------------------------------
# Memory layout (8 KB main DRAM at $0000-$1FFF + GEN2 framebuffer $2000-$3FFF):
#
#   $0000-$001F  Sokoban zero-page scalars (ZP segment)
#   $0020-$009F  LEVEL_BUF  (128 B, ZP-indexed — LEVELBUF segment)
#   $00A0-$00FF  free
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed while game runs)
#   $0280-$1EFF  program code + data (7 296 B — CODE segment)
#   $1F00-$1FEF  STATE_GRID (240 B, 20x12, absolute-indexed — STATEGRID segment)
#   $1FF0-$1FFF  free
#   $2000-$3FFF  GEN2 framebuffer (provided by the card, read-only from host)
#
# HGR keeps 20x12 to preserve the 280-pixel wide display.
# STATEGRID is 240 B (vs 192 B on the text/TMS variants).

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF: start = $0020, size = $0080, type = rw, define = yes;
    ZPTMP:  start = $00A0, size = $0060, type = rw, define = yes;
    CODE:   start = $0280, size = $1C80, type = ro, define = yes, file = %O;
    STGRID: start = $1F00, size = $00F0, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LEVELBUF:  load = LVLBUF, type = zp;
    ZPSCRATCH: load = ZPTMP,  type = zp;
    CODE:      load = CODE,   type = ro;
    STATEGRID: load = STGRID, type = bss;
}
