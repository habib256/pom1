# cc65 linker config for TMS_Maze3D as a FULL CodeTank bank — RUN-IN-PLACE
# from ROM at $4000 (jumper Lower or Upper, then 4000R boots the game; the
# entry point `main:` is the first byte of CODE). Successor of the retired
# apple1_maze3d_codetank_game6_bank.cfg ($4200 behind the GAME6 menu, gone
# with the juillet 2026 four-cartridge reorganisation) — one game per bank,
# no menu, DevBench-flashable into CODETANKDEV while the 5th release
# cartridge is decided.
#
# Why run-in-place and not a RAM image: the historical standalone build
# loads at $0280-$1A78 with BSS at $1B00 — beyond the Parmigiani dual-bank
# low-RAM ceiling ($0FFF), where strict OOR drops everything in
# [$1000, $8000). Running from ROM with the state squeezed into $0E00-$0EFF
# makes the game playable on Claudio's silicon.
#
#   $0000-$00FF  ZP scalars (extended ZP — the game uses ~77 B)
#   $0100-$01FF  6502 stack
#   $0E00-$0E4C  GRID    (77 B — maze cells, 11x7)
#   $0E50-$0E9C  STK     (77 B — DFS backtracker stack)
#   $0EA0-$0EFF  MOBS    (96 B — monsters table, 8 mobs x 12 B)
#   $4000-$7FFF  Maze3D code + ROM tables (CODE — full 16 kB bank window)
#
# All long-running game state lives in ZP + the three segments above; the
# CODE segment is never written (verified store-target audit), so ROM
# execution is safe.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
    GRID:  start = $0E00, size = $0050, type = rw, define = yes;
    STK:   start = $0E50, size = $0050, type = rw, define = yes;
    MOBS:  start = $0EA0, size = $0060, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    GRIDSEG:  load = GRID, type = bss;
    STKSEG:   load = STK,  type = bss;
    MOBSEG:   load = MOBS, type = bss;
}
