# cc65 linker config for tms9918_hello (sketchs/tms9918/tms9918_hello/
# tms9918_hello.s) in the Codetank_GAME4.rom lower-bank layout. Hello
# occupies the fourth slot, $6100-$68FF (2 048 B slot). The GAME4 lower
# menu at $4000 JMPs here.
#
# The sketch is fully self-contained: raw $CC00/$CC01 pokes, all tables
# in CODE, no ZP, no BSS, ends in an infinite loop (reset to leave).
# All VRAM writes happen with the display blanked (reg1 = $80 until the
# final enable), so the free ScreenOff slot table absorbs the back-to-
# back stores — silicon-safe without pads.

MEMORY {
    CODE: start = $6100, size = $0800, type = ro, define = yes, file = %O;
}

SEGMENTS {
    CODE: load = CODE, type = ro;
}
