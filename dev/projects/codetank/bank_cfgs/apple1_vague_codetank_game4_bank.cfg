# cc65 linker config for TMS_Vague in the Codetank_GAME4.rom lower-bank
# layout. Vague occupies the third slot of the lower 16 kB bank,
# $5100-$60FF (4 096 B slot). The GAME4 lower menu at $4000 JMPs here.
#
# ZP / BSS placement copied from the standalone CodeTank cfg
# (sketchs/tms9918/demo_vague/apple1_vague_codetank.cfg). BSS overlaps
# the other GAME4 demos' BSS on purpose — only one demo runs at a time
# (ESC exits to Wozmon; re-enter with 4000R).
#
#   $0000-$001F  ZP scalars (RAM)
#   $0100-$01FF  6502 stack
#   $0F80-$0FFF  BSS (wave_y_buf / tile_buf, dual-bank low RAM)
#   $4000-$40FF  GAME4 lower menu (separate config)
#   $4100-$50FF  Split  (separate config)
#   $5100-$60FF  Vague code (CODE segment, this config — 4 096 B slot)
#   $6100-$68FF  Hello  (separate config)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $5100, size = $1000, type = ro, define = yes, file = %O;
    BSS:   start = $0F80, size = $0080, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
