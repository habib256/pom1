# cc65 linker config for TMS_Split in the Codetank_GAME4.rom lower-bank
# layout. Split occupies the second slot of the lower 16 kB bank,
# $4100-$50FF (4 096 B slot). The GAME4 lower menu at $4000 JMPs here.
#
# ZP / BSS placement copied from the standalone CodeTank cfg
# (sketchs/tms9918/demo_split/apple1_split_codetank.cfg). BSS overlaps
# the other GAME4 demos' BSS on purpose — only one demo runs at a time
# (Split auto-exits to Wozmon after ~10 s; re-enter with 4000R).
#
#   $0000-$001F  ZP scalars (RAM)
#   $0100-$01FF  6502 stack
#   $0F80-$0FFF  BSS (wave/sine buffers, dual-bank low RAM)
#   $4000-$40FF  GAME4 lower menu (separate config)
#   $4100-$50FF  Split code (CODE segment, this config — 4 096 B slot)
#   $5100-$60FF  Vague  (separate config)
#   $6100-$68FF  Hello  (separate config)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $4100, size = $1000, type = ro, define = yes, file = %O;
    BSS:   start = $0F80, size = $0080, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
