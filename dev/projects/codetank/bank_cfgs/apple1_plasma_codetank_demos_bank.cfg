# cc65 linker config for TMS_Plasma in the Codetank_DEMOS.rom lower-bank
# layout. Plasma occupies the fourth slot of the lower 16 kB bank,
# $5200-$59FF (2 048 B slot). The DEMOS lower menu at $4000 JMPs here.
#
# Plasma's runtime buffers live at absolute addresses in low RAM
# (plasma_starts at $0C00, sine_table at $0F00) — declared in the .asm
# at fixed addresses, NOT allocated by ld65. Inside the Parmigiani
# dual-bank low RAM ($0000-$0FFF). $0C00 conflicts with Mandel's sq_lo
# but only one program runs at a time (menu picks one).
#
#   $0000-$004F  ZP scalars (RAM, project + tms9918m1 lib)
#   $0100-$01FF  6502 stack
#   $0C00-$0EFF  plasma_starts buffer (768 B, runtime)
#   $0F00-$0FFF  sine_table (256 B, page-aligned)
#   $4000-$41FF  DEMOS lower menu (separate config)
#   $4200-$49FF  Life    (separate config)
#   $4A00-$51FF  Mandel  (separate config)
#   $5200-$59FF  Plasma code (CODE segment, this config — 2 048 B slot)
#   $5A00-$5FFF  Vague   (separate config)
#   $6000-$7FFF  Nyan    (separate config)

MEMORY {
    ZP:    start = $0000, size = $0050, type = rw, define = yes;
    CODE:  start = $5200, size = $0800, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
