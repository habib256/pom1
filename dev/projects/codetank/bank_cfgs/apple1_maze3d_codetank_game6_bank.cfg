# cc65 linker config for TMS_Maze3D in the Codetank_GAME6.rom lower-bank
# layout — RUN-IN-PLACE from ROM at $4200 (the GAME6 menu at $4000 JMPs
# straight here; no RAM copy).
#
# Why run-in-place and not the GAME6 ROM->RAM packer: the historical
# standalone image loads at $0280-$1A78 with BSS at $1B00-$1BFF — both
# beyond the Parmigiani dual-bank low RAM ceiling ($0FFF), so a RAM copy
# is impossible on the real Replica/Original 4K+4K layout (strict OOR
# drops everything in [$1000, $8000)). Relinking the resurrected source
# into ROM with the state segments squeezed into $0E00-$0EFF makes the
# game genuinely playable on Claudio's silicon.
#
#   $0000-$00FF  ZP scalars (extended ZP — the game uses ~64 B)
#   $0100-$01FF  6502 stack
#   $0E00-$0E4C  GRID    (77 B — maze cells, 11x7)
#   $0E50-$0E9C  STK     (77 B — DFS backtracker stack)
#   $0EA0-$0EFF  MOBS    (96 B — monsters table, 8 mobs x 12 B)
#   $4000-$41FF  GAME6 lower menu + packer (separate config)
#   $4200-$5DFF  Maze3D code + ROM tables (CODE, this config — 7 168 B)
#
# All long-running game state lives in ZP + the three segments above;
# the CODE segment is never written (verified store-target audit), so
# ROM execution is safe.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $4200, size = $1C00, type = ro, define = yes, file = %O;
    GRID:  start = $0E00, size = $0050, type = rw, define = yes;
    STK:   start = $0E50, size = $0050, type = rw, define = yes;
    MOBS:  start = $0EA0, size = $0060, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    GRIDSEG:  load = GRID, type = bss;
    STKSEG:   load = STK,  type = bss;
    MOBSEG:   load = MOBS, type = bss;
}
