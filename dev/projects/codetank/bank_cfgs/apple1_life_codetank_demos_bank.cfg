# cc65 linker config for TMS_Life in the Codetank_DEMOS.rom lower-bank
# layout. Life occupies the second slot of the lower 16 kB bank,
# $4200-$49FF (2 048 B slot). The DEMOS lower menu at $4000 JMPs here.
#
# Life's two grids live at fixed absolute addresses ($0900/$0C80 in
# the .asm) — that's RAM, not in this cfg. The grids must stay inside
# the Parmigiani dual-bank low RAM ($0000-$0FFF); $1000-$7FFF is OOR
# on every TMS9918 preset.
#
#   $0000-$001F  ZP scalars (RAM)
#   $0100-$01FF  6502 stack
#   $4000-$41FF  DEMOS lower menu (separate config)
#   $4200-$49FF  Life code (CODE segment, this config — 2 048 B slot)
#   $4A00-$51FF  Mandel  (separate config)
#   $5200-$59FF  Plasma  (separate config)
#   $5A00-$5FFF  Vague   (separate config)
#   $6000-$7FFF  Nyan    (separate config)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $4200, size = $0800, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
