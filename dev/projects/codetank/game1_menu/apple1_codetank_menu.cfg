# cc65 linker config for the CodeTank menu - lives at the start of the
# 16 kB bank ($4000-$40FF, 256 B reserved). No RAM use; the menu only
# touches $D010/$D011/$D012 and the JMP target.

MEMORY {
    CODE: start = $4000, size = $0100, type = ro, define = yes, file = %O;
}

SEGMENTS {
    CODE: load = CODE, type = ro;
}
