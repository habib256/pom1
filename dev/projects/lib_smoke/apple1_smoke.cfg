# cc65 linker config for LibSmoke -- the lib/apple1 + lib/m6502 ZP convention
# validation project. Mirrors apple1.cfg but adds a small BSS region for
# math.asm's prod_lo / prod_hi / sign_flag / lfsr_lo / lfsr_hi.
#
# Memory layout:
#   $0000-$0022  Zero page (35 bytes)
#   $0280-$0E7F  Code + read-only data (3072 bytes, output file)
#   $0F00-$0F3F  BSS (64 bytes, RAM only — not in the .bin)
#
# Output binary loads at $0280 as usual; user types `280R` in Wozmon.

MEMORY {
    ZP:   start = $0000, size = $0023, type = rw, define = yes;
    CODE: start = $0280, size = $0C00, type = ro, define = yes, file = %O;
    BSS:  start = $0F00, size = $0040, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
