# cc65 linker config for TMS_Life as the sole occupant of Codetank_GAME3.rom
# lower bank. Life runs in place from $4000-$7FFF (16 kB available; ~1.5 kB
# used). The upper bank is currently empty (filled with $FF) — reserved for
# future expansion.
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$07FF  free low-bank RAM
#   $0800-$0BBF  GRID_LO   (944 B grid, GEN1 segment if used)
#   $0C00-$0FBF  GRID_HI   (944 B grid, GEN2 segment if used)
#   $4000-$7FFF  Life code (CODE segment, run-in-place from ROM)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
