# cc65 linker config for TMS_Life in the fifth slot of the CodeTank
# lower bank. Code runs in place from $7A00.
#
#   $0000-$0018  ZP scalars (25 B used - ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$07FF  free RAM
#   $0800-$0B73  grid_a       (884 B, absolute - declared in the .asm)
#   $0C00-$0F73  grid_b       (884 B, absolute - declared in the .asm)
#   $4000-$79FF  CodeTank menu + Galaga + Sokoban + Snake (other configs)
#   $7A00-$7FFF  Life code (CODE segment, this config) - 1 536 B slot
#
# Life's two grids live at fixed absolute addresses ($0800/$0C00 in
# the .asm via `grid_a := $0800`) so they never appear in the linker
# config; ld65 only sees CODE here. The grids must stay inside the
# Parmigiani dual-bank low RAM ($0000-$0FFF) — $1000-$7FFF is OOR on
# every TMS9918 preset and the strict-OOR check drops writes there.

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $7A00, size = $0600, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
