# cc65 linker config for TMS_SilBench shipped on a P-LAB CodeTank ROM.
# -----------------------------------------------------------------
# 16 KB ROM image runs in place from the CodeTank's $4000-$7FFF window.
# All test state lives in the bare 4 KB Apple-1 RAM ($0000-$0FFF):
#
#   $0000-$003F  ZP scalars (ZEROPAGE, 64 B)
#   $0100-$01FF  6502 stack
#   $0200-$02FF  BSS (per-test result + numeric value storage, 256 B)
#   $0300-$0FFF  free RAM (unused by silbench — keep available for
#                hand-edited follow-up tests in Wozmon)
#   $4000-$7FFF  CODE: program + data tables (~16 kB).
#
# Entry point: 4000R from the Woz Monitor (main: is the first label
# emitted by ca65 inside .code, so it lands at $4000 verbatim). Build
# the ROM image with tools/build_codetank_rom.py — see README.md.
#
# All read-only tables (test name strings, expected status snapshots,
# sprite pattern blobs) live inside .code so they're served from ROM.
# Status latches and per-test result buffers live in BSS at $0200.

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    BSS:   start = $0200, size = $0100, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    BSS:      load = BSS,  type = bss;
    CODE:     load = CODE, type = ro;
}
