# cc65 linker config for TMS_SilBench — stock 4 KB Apple-1 layout.
# -----------------------------------------------------------------
# Used during early-bring-up (≤ 8-9 tests). Once the binary outgrows
# this layout switch to apple1_silbench_codetank.cfg (16 KB ROM image
# running in place from $4000-$7FFF on the CodeTank daughterboard).
#
#   $0000-$003F  ZP scalars (ZEROPAGE, 64 B)
#   $0100-$01FF  6502 stack
#   $0200-$027F  BSS (per-test result + numeric value storage, 128 B)
#   $0280-$0FFF  CODE: program code + RO data (~3.5 kB available).
#
# Loads via Wozmon `280R` from the Apple-1 cassette / file dialog.
# Compatible with every POM1 preset that plugs the TMS9918 (Parmigiani
# dual-bank, CodeTank, Multiplexing Fantasy).

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    BSS:   start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $0280, size = $0D80, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    BSS:      load = BSS,  type = bss;
    CODE:     load = CODE, type = ro;
}
