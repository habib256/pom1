# cc65 linker config for TMS_Nyan — STOCK 4 KB Apple-1 + TMS9918
# -----------------------------------------------------------------
# Memory layout:
#   $0000-$002F  ZP scalars (~48 B): VDP write addr, frame index, vsync
#                counter, animation state byte, delta-loop scratch
#   $0100-$01FF  6502 stack
#   $0280-$0FFF  CODE + data (~3.5 KB available)
#                Holds: code (~700 B) + nyan_frame0 (1 536 B) +
#                       4 delta tables (4 * 102 = 408 B) = ~2.6 KB image
#
# Compatible with every POM1 preset that plugs the TMS9918. Mode III
# (Multicolor) only needs 1 536 bytes of pattern data + the 768-byte
# fan-out name table — well below the chip's 16 KB VRAM.

MEMORY {
    ZP:    start = $0000, size = $0030, type = rw, define = yes;
    CODE:  start = $0280, size = $0D80, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
