# cc65 linker config for APPLE-1 LOGO V2.0 -- 16 KB DRAM build.
# -----------------------------------------------------------------
# Stub for the upcoming V2.0 work. Lays out a 16 KB Apple-1 RAM map
# with all the headroom V1.8 didn't have.
#
#   $0000-$001F  ZP scalars (ZEROPAGE, 32 B)
#   $0100-$01FF  6502 stack
#   $0200-$027F  LBUF: line buffer + parser scratch (128 B)
#   $0280-$2FFF  CODE: program code + RO data (~11.5 kB headroom)
#   $3000-$3FFF  PROC: proc storage + control stack (4 kB)
#   $4000+       starts the I/O / TMS9918 / cassette window — off-limits
#
# Compared to the 8 KB build (CODE 6 480 B, PROC 1 072 B), this gives:
#   - CODE: 11 392 B  (+4 912 B)  → arithmetic, IF/THEN/ELSE, sprites...
#   - PROC:  4 096 B  (+3 024 B)  → ~16 procs of 256 B body, deeper nesting
#
# When V2.0 also targets CodeTank, pair this with a relocator config that
# moves CODE to $4000-$7FFF; PROC stays in the 16 kB Apple-1 RAM.

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    LBUF:  start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $0280, size = $2D80, type = ro, define = yes, file = %O;
    PROC:  start = $3000, size = $1000, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    LINEBUF:  load = LBUF, type = bss;
    CODE:     load = CODE, type = ro;
    PROCBSS:  load = PROC, type = bss;
}
