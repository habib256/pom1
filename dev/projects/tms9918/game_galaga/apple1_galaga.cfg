# cc65 linker config for TMS_Galaga on Apple 1 + TMS9918 (8 KB DRAM)
# -----------------------------------------------------------------
#
#   $0000-$007F  ZP scalars (extended ZP, ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed at runtime)
#   $0280-$1FFF  program code + data (7 552 B - CODE segment)
#
# All game state lives in the 128-byte ZP block. Sprite attribute and
# pattern tables live in the TMS9918's private 16 KB VRAM, not main bus.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $0280, size = $1D80, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
