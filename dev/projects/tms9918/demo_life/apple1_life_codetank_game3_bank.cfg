# cc65 linker config for TMS_Life in the Codetank_GAME3.rom upper-bank
# layout. Life occupies the second slot of the upper 16 kB bank,
# $4100-$48FF (2 048 B slot, currently ~1 558 B). The GAME3 upper menu
# at $4000 JMPs here.
#
# Life's two grids live at fixed absolute addresses ($0800/$0C00 in
# the .asm via `grid_a := $0800`) — that's RAM, not in this cfg.
# The grids must stay inside the Parmigiani dual-bank low RAM
# ($0000-$0FFF); $1000-$7FFF is OOR on every TMS9918 preset.
#
#   $0000-$001F  ZP scalars (RAM)
#   $0100-$01FF  6502 stack
#   $0800-$0B73  grid_a (884 B, absolute - declared in the .asm)
#   $0C00-$0F73  grid_b (884 B, absolute - declared in the .asm)
#   $4000-$40FF  GAME3 upper menu (separate config)
#   $4100-$48FF  Life code (CODE segment, this config — 2 048 B slot)
#   $4900-$50FF  Mandel  (separate config)
#   $5100-$58FF  Plasma  (separate config)
#   $5900-$7FFF  free (reserved)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $4100, size = $0800, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
