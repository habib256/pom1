# cc65 linker config for APPLE-1 LOGO for TMS9918
# -----------------------------------------------------------------
# Target: 8 KB DRAM Apple-1 (Replica-1 / NTI 8K expansion).
# Memory layout (0000-1FFF = 8 KB DRAM, plus Woz Monitor ROM):
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  line buffer + parser scratch (LINEBUF, 128 B)
#   $0280-$1BBF  program code + data (CODE, 6464 B)
#   $1BC0-$1FFF  user procedure storage + save buffers (PROC, 1088 B)
#
# PROC layout (V1.8): 5 proc slots of 180 B each = 900 B for proc_table,
# + two 60-byte save buffers (outer + 1 nested level) for line_buf during
#   proc invocation
# + 2 saved line_idx + 14 B param frame + 3 B (def_mode, cur_proc_lo/hi)
# + scratch for IF and tail-call trampoline + small bookkeeping
# = ~1057 B used, balance is padding.
# Slot V1.8: 6 name + 1 n_params + 12 params (2 x 6) + 1 body_len + 160 body.
# CODE grew (was 6144) to fit IF/STOP/arithmetic + tail-call trampoline.
# PROC shrunk by dropping MAX_PROCS 6→5 (still room for THING THING1 THING2
# THING3 SPIRAL).

MEMORY {
    ZP:    start = $0000, size = $0021, type = rw, define = yes;
    LBUF:  start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $0280, size = $1950, type = ro, define = yes, file = %O;
    PROC:  start = $1BD0, size = $0430, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    LINEBUF:  load = LBUF, type = bss;
    CODE:     load = CODE, type = ro;
    PROCBSS:  load = PROC, type = bss;
}
