# cc65 linker config for APPLE-1 LOGO shipped on a P-LAB CodeTank ROM,
# upper bank, alongside Tetris.
# -----------------------------------------------------------------
# CodeTank upper-bank layout (when board jumper = Upper):
#
#   $4000-$407F  Tetris launcher (existing, copies payload to RAM)
#   $4080-$5DAC  Tetris raw payload (7 308 B)
#   $5DAD-$5DFF  $FF padding
#   $5E00-$xxxx  LOGO interpreter (CODE segment, this build)
#   $xxxx-$7FFF  $FF padding
#
# Apple-1 RAM layout (run-in-place from ROM, all writes hit RAM):
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment, 32 B)
#   $0020-$00FF  free ZP (unused by LOGO -- available to user)
#   $0100-$01FF  6502 stack
#   $0200-$027F  LBUF: line_buf + parser scratch + small turtle state (128 B)
#   $0280-$06CF  PROC: proc_table + save buffers + var_table + params (1 088 B)
#   $06D0-$3FFF  free RAM (no LOGO state here)
#
# Variables are packed contiguously starting right after the stack
# (LBUF immediately at $0200, PROC immediately at $0280) so the entire
# LOGO data area lives in the first 1.5 kB of RAM and there is no
# conflict with anything Tetris does later (Tetris occupies $0280-$1FAC
# in RAM, but only one program runs at a time -- BSS overlap is safe).
#
# Entry point: 5E00R from the Woz Monitor with the CodeTank board jumper
# in the Upper position. Type 4000R instead and you get Tetris.

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    LBUF:  start = $0200, size = $0080, type = rw, define = yes;
    PROC:  start = $0280, size = $0450, type = rw, define = yes;
    CODE:  start = $5E00, size = $2200, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    LINEBUF:  load = LBUF, type = bss;
    CODE:     load = CODE, type = ro;
    PROCBSS:  load = PROC, type = bss;
}
