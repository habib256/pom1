# cc65 linker config for TMS_Tunnel -- needs 256 bytes of BSS for tile_buf,
# so the default 128 B BSS slot of the stock 4 KB cfg is bumped to 256.
#
#   $0000-$001F  ZP scalars
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard buffer
#   $0280-$0EFF  CODE (~3.1 KB -- LUT 768 B + code ~250 B + patterns)
#   $0F00-$0FFF  BSS (tile_buf 256 B)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $0280, size = $0C80, type = ro, define = yes, file = %O;
    BSS:   start = $0F00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
