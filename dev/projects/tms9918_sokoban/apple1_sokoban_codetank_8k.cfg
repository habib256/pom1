# cc65 linker config: TMS_Sokoban in a CodeTank 8 kB upper-half slot.
# -----------------------------------------------------------------
# Used by the dualslot8k layout where Galaga and Sokoban each get 8 kB
# inside the lower 16 kB bank ($6000-$7FFF for Sokoban). Entry: 6000R.

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF: start = $0020, size = $0080, type = rw, define = yes;
    STGRID: start = $0F00, size = $00C0, type = rw, define = yes;
    CODE:   start = $6000, size = $2000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LEVELBUF:  load = LVLBUF, type = zp;
    STATEGRID: load = STGRID, type = bss;
    CODE:      load = CODE,   type = ro;
}
