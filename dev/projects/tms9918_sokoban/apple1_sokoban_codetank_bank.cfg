# cc65 linker config for TMS_Sokoban in the GAME1 menu-bank layout.
# Sokoban occupies the third slot of the lower 16 kB bank, $6100-$75FF
# (5 376 B slot, bumped from 5 120 B in May 2026 to absorb Galaga's growth
# under the 24c silicon-strict contract). Start moved up by 256 B.
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0020-$009F  LEVEL_BUF (128 B, ZP-indexed - LEVELBUF segment)
#   $0100-$01FF  6502 stack
#   $0200-$0EFF  free RAM
#   $0F00-$0FBF  STATE_GRID (192 B - STATEGRID segment, abs,X)
#   $4000-$40FF  CodeTank menu (other config)
#   $4100-$60FF  Galaga        (other config, 8 192 B)
#   $6100-$75FF  Sokoban code (CODE segment, this config) - 5 376 B slot
#   $7600-$7FFF  Snake         (other config)

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF: start = $0020, size = $0080, type = rw, define = yes;
    STGRID: start = $0F00, size = $00C0, type = rw, define = yes;
    CODE:   start = $6100, size = $1500, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LEVELBUF:  load = LVLBUF, type = zp;
    STATEGRID: load = STGRID, type = bss;
    CODE:      load = CODE,   type = ro;
}
