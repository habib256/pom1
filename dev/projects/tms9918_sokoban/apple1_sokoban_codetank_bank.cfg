# cc65 linker config for TMS_Sokoban packed in the lower CodeTank bank
# alongside Galaga, Snake and Life. Tightest slot of the bank: only
# 100 B of headroom over Sokoban's current 4 764 B - any growth past
# 4 864 B will spill into Snake's slot at $7100 and the build will fail.
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0020-$009F  LEVEL_BUF (128 B, ZP-indexed - LEVELBUF segment)
#   $0100-$01FF  6502 stack
#   $0200-$0EFF  free RAM
#   $0F00-$0FBF  STATE_GRID (192 B - STATEGRID segment, abs,X)
#   $4000-$40FF  CodeTank menu  (other config)
#   $4100-$5DFF  Galaga         (other config)
#   $5E00-$70FF  Sokoban code (CODE segment, this config) - 4 864 B slot
#   $7100-$79FF  Snake          (other config)
#   $7A00-$7FFF  Life           (other config)

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF: start = $0020, size = $0080, type = rw, define = yes;
    STGRID: start = $0F00, size = $00C0, type = rw, define = yes;
    CODE:   start = $5E00, size = $1300, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LEVELBUF:  load = LVLBUF, type = zp;
    STATEGRID: load = STGRID, type = bss;
    CODE:      load = CODE,   type = ro;
}
