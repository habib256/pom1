# cc65 linker config for TMS_Stars -- stock 4 KB Apple-1 + TMS9918.
#
#   $0000-$001F  ZP scalars
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard buffer
#   $0280-$0F7F  CODE (~3.4 KB)
#   $0F80-$0FFF  BSS (x_buf 32 B + headroom)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $0280, size = $0D00, type = ro, define = yes, file = %O;
    BSS:   start = $0F80, size = $0080, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
