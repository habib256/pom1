# cc65 linker config for TMS_LightCorridor — full Codetank_GAME4.rom lower
# bank, $4000-$7FFF (16 kB), run-in-place from ROM. The GAME4 cartridge is
# dedicated to Light Corridor: there is no menu on the lower bank, the
# game's `start:` label IS the cartridge entry at $4000.
#
# Memory map (Parmigiani dual-bank — TMS9918 preset):
#   $0000-$003F  ZP scalars (game state, project-defined)
#   $0040-$00FF  ZP shared with tms9918m2.asm (pix_*/ln_*/pen_color/tmp/tmp2)
#   $0100-$01FF  6502 stack
#   $0280-$0FFF  free low-bank RAM (unused for now — game state fits in ZP)
#   $4000-$7FFF  CODE/RODATA from this config (16 kB ROM)
#
# Other CodeTank banks for reference:
#   GAME4 upper  reserved / $FF fill (future expansion)
#
# Sprite patterns + level data live in RODATA (folded into CODE by the
# segment map below), so the cartridge is fully self-contained.

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    RODATA:   load = CODE, type = ro;
}
