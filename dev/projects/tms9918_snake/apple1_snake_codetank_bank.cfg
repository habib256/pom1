# cc65 linker config for TMS_Snake in the GAME1 menu-bank layout.
# Snake occupies the fourth slot of the lower 16 kB bank, $7600-$7FFF
# (2 560 B — fits the 2 323 B current binary with 237 B headroom).
# Moved up by 512 B in May 2026 to absorb Galaga's growth under the 24c
# silicon-strict contract; the prior $7E00-$7FFF end-headroom is now part
# of Snake's slot.
#
#   $0000-$001F  ZP scalars (22 B used - ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$0BFF  free RAM
#   $0C00-$0CFF  SNAKE_X ring buffer (256 B - SNXSEG, abs,X)
#   $0D00-$0DFF  SNAKE_Y ring buffer (256 B - SNYSEG, abs,X)
#   $0E00-$0FFF  free RAM
#   $4000-$75FF  Menu + Galaga + Sokoban (other configs)
#   $7600-$7FFF  Snake code (CODE segment, this config) - 2 560 B slot
#
# SNAKE_X / SNAKE_Y stay page-aligned (Snake's source assumes that,
# so abs,X indexing wraps within one page).

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    SNX:   start = $0C00, size = $0100, type = rw, define = yes;
    SNY:   start = $0D00, size = $0100, type = rw, define = yes;
    CODE:  start = $7600, size = $0A00, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    SNXSEG:   load = SNX,  type = bss;
    SNYSEG:   load = SNY,  type = bss;
    CODE:     load = CODE, type = ro;
}
