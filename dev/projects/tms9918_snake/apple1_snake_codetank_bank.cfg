# cc65 linker config for TMS_Snake in the fourth slot of the CodeTank
# lower bank. Code runs in place from $7100.
#
#   $0000-$001F  ZP scalars (22 B used - ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$0BFF  free RAM
#   $0C00-$0CFF  SNAKE_X ring buffer (256 B - SNXSEG, abs,X)
#   $0D00-$0DFF  SNAKE_Y ring buffer (256 B - SNYSEG, abs,X)
#   $0E00-$0FFF  free RAM
#   $4000-$70FF  CodeTank menu + Galaga + Sokoban (other configs)
#   $7100-$79FF  Snake code (CODE segment, this config) - 2 304 B slot
#   $7A00-$7FFF  Life          (other config)
#
# SNAKE_X / SNAKE_Y stay page-aligned (Snake's source assumes that,
# so abs,X indexing wraps within one page). Same memory layout as
# the standalone apple1_snake.cfg apart from CODE moving to ROM.

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    SNX:   start = $0C00, size = $0100, type = rw, define = yes;
    SNY:   start = $0D00, size = $0100, type = rw, define = yes;
    CODE:  start = $7100, size = $0900, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    SNXSEG:   load = SNX,  type = bss;
    SNYSEG:   load = SNY,  type = bss;
    CODE:     load = CODE, type = ro;
}
