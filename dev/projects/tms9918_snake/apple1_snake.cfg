# cc65 linker config for TMS_Snake on a STOCK 4 KB Apple 1 + TMS9918
# -----------------------------------------------------------------
# Memory layout (4 KB DRAM at $0000-$0FFF + Woz Monitor ROM):
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed at runtime)
#   $0280-$0DFF  program code + data (2 944 B - CODE segment)
#   $0E00-$0EFF  SNAKE_X (256 B, ring buffer of segment columns)
#   $0F00-$0FFF  SNAKE_Y (256 B, ring buffer of segment rows)
#
# Bumped CODE from 2 432 B → 2 944 B in May 2026 to absorb the WAIT_VBLANK
# macro at the start of every render burst (canonical $CC01 polling
# pattern from dev/lib/tms9918/tms9918.inc). SNAKE_X / SNAKE_Y moved up
# by 512 B; both stay page-aligned so abs,X indexing still wraps inside
# one page.
#
# The grid-based collision array (768 B) used by earlier revisions is
# gone: walls are checked by coordinate, food by (food_x/food_y) compare,
# and snake-body collisions by walking the snake_x/y ring buffer
# (tail_idx+1 .. head_idx). This keeps everything inside the stock 4 KB
# DRAM that ships with a 1976 Apple-1.
#
# snake_x / snake_y stay page-aligned so abs,X indexing wraps inside one
# page and `LDA snake_x,X` is a 4-cycle, 3-byte instruction.

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $0280, size = $0B80, type = ro, define = yes, file = %O;
    SNX:   start = $0E00, size = $0100, type = rw, define = yes;
    SNY:   start = $0F00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    SNXSEG:   load = SNX,  type = bss;
    SNYSEG:   load = SNY,  type = bss;
}
