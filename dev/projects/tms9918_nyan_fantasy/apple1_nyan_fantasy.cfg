# cc65 linker config for TMS_Nyan_Fantasy — XXL 12-frame port.
# -------------------------------------------------------------
# Mirrors dev/cc65/pom1_fantasy.cfg but tightens CODE size to ~24 KB
# since the Nyan port doesn't need the full 32 KB. We DO keep the
# BASIC_RAM region wired up for symmetry — projects that grow beyond
# this can swap in pom1_fantasy.cfg without touching their .asm.
#
# Required POM1 state: preset 11 OR preset 13 with TMS9918 plugged.
# Applesoft Lite + SD CARD OS may stay PLUGGED — our CODE region
# stops at $5FFF so it doesn't collide with their $6000-$9FFF span.
#
# Memory layout:
#   $0000-$007F  Zero page (128 B)
#   $0100-$01FF  6502 stack
#   $0280-$5FFF  CODE / DATA / RODATA — ~24 KB output file
#                Holds: code (~700 B) + 12 × 1 536 B animation = 19 132 B
#   $6000-$7FFF  Applesoft Lite (may be plugged — we don't write here)
#   $8000-$9FFF  SD CARD OS (idem)
#   $A000-$BFFF  BASIC_RAM (BSS, 8 KB — unused by this project but kept
#                            for cfg interchangeability)

MEMORY {
    ZP:        start = $0000, size = $0080, type = rw, define = yes;
    CODE:      start = $0280, size = $5D80, type = ro, define = yes, file = %O;
    BASIC_RAM: start = $A000, size = $2000, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,        type = zp;
    CODE:     load = CODE,      type = ro;
    DATA:     load = CODE,      type = ro;
    RODATA:   load = CODE,      type = ro;
    BSS:      load = BASIC_RAM, type = bss, define = yes;
}
