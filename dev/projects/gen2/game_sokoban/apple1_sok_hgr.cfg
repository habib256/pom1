# cc65 linker config for HGR Sokoban on an Apple-1 + GEN2 card.
# -----------------------------------------------------------------
# Target: Parmigiani 8 KB dual-bank (4 KB low at $0000-$0FFF + 4 KB high at
# $E000-$EFFF) + GEN2 framebuffer at $2000-$3FFF. POM1 preset 11.
#
# Sokoban does NOT fit in a single 4 KB CODE bank: tile bitmaps + 72 RLE
# levels + bbfont subset + strings push the data side past 3 KB on its
# own. We therefore split between the two RAM banks (per Parmigiani) and
# emit two binaries that the project's Makefile concatenates into one
# Wozmon-hex .txt:
#
#   $0000-$001F  Sokoban zero-page scalars (ZP segment)
#   $0020-$009F  LEVEL_BUF  (128 B, ZP-indexed — LEVELBUF segment)
#   $00A0-$00FF  free
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer (reclaimed at runtime)
#   $0280-$0FFF  DATA_LOW   (3 456 B, .lo file): tile bitmaps, bbfont,
#                            level data, level_ptrs, strings
#   $1000-$1FFF  -- dual-bank gap, no RAM
#   $2000-$3FFF  GEN2 HGR framebuffer (provided by the card)
#   $E000-$EEFF  CODE       (3 840 B, .hi file): all program logic
#   $EF00-$EFEF  STATEGRID  (240 B, BSS — runtime only, NOT in any file)
#   $EFF0-$EFFF  free
#
# Output files:
#   software/hgr/HGR_Sokoban.bin.lo   (3 200 B max, loads at $0280)
#   software/hgr/HGR_Sokoban.bin.hi   (4 096 B max, loads at $E000)
#   software/hgr/HGR_Sokoban.txt      (concatenated Wozmon hex, runs E000R)
#
# HGR keeps 20x12 to preserve the 280-pixel wide display.
# STATEGRID is 240 B (vs 192 B on the text/TMS variants).

MEMORY {
    ZP:       start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF:   start = $0020, size = $0080, type = rw, define = yes;
    ZPTMP:    start = $00A0, size = $0060, type = rw, define = yes;
    DATALOW:  start = $0280, size = $0D80, type = ro, define = yes, file = "%O.lo";
    # $1000-$1FFF  no RAM (dual-bank gap)
    # $2000-$3FFF  GEN2 framebuffer
    CODEHIGH: start = $E000, size = $0F00, type = ro, define = yes, file = "%O.hi";
    # STGRID lives in the high bank (BSS only, no file). $EF00-$EFEF
    # gives the 240-byte 20x12 state grid; $EFF0-$EFFF stays free.
    STGRID:   start = $EF00, size = $00F0, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,       type = zp;
    LEVELBUF:  load = LVLBUF,   type = zp;
    ZPSCRATCH: load = ZPTMP,    type = zp;
    DATA_LOW:  load = DATALOW,  type = ro;
    STATEGRID: load = STGRID,   type = bss;
    CODE:      load = CODEHIGH, type = ro;
}
