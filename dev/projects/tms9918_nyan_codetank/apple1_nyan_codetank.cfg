# cc65 linker config for TMS_Nyan_CodeTank — fits in a 16 KB CodeTank slot.
# --------------------------------------------------------------------------
# Lives at $4000-$7FFF (lower or upper jumper of the 28c256). Run-in-place
# from ROM — no RAM copy. ZP usage in the host Apple-1's $0000-$00FF.
#
# Image budget: 16 KB slot, ~8 KB used (12 RLE-compressed frames + decoder
# + Mode III init + name-table fan-out). 50 % free for adding music or
# additional frames.
#
# Memory layout:
#   $0000-$007F  Zero page (host Apple-1 RAM)
#   $0100-$01FF  6502 stack (host RAM)
#   $4000-$7FFF  CodeTank ROM (16 KB, run-in-place)
#                Holds: code (~700 B) + nyan_rle.asm (~7 KB compressed)
#                Pad to 16 384 B for the .rom image step (handled by
#                the project's tools/build_codetank_nyan.py, NOT ld65).
#
# Run from Wozmon: `4000R`. Works with both Lower and Upper jumper —
# place identical content in both halves of the 32 KB ROM image, OR
# pair with another program in the other half.

MEMORY {
    ZP:    start = $0000, size = $0080, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
