# cc65 linker config for TMS_Rogue inside the Codetank_GAMES2.rom
# lower bank. Code runs in place from $4000 (no menu in MVP1 — Rogue
# is the only game in the cartridge for now). When MVP4 lands the
# build_games2_rom.py picker, swap to apple1_rogue_codetank_bank.cfg
# and link at $4100 below a 256 B menu at $4000.
#
# Parmigiani dual-bank RAM (preset 8 / standard P-LAB layout):
#   low bank  $0000-$0FFF, high bank $E000-$EFFF, hole $1000-$7FFF.
# Map buffer goes in the high bank to leave the low bank fully free
# for runtime BSS as MVP2/3 grow.
#
#   $0000-$001F  ZP scalars (lib's vdp_* + project tmp)
#   $0100-$01FF  6502 stack
#   $0200-$0FFF  free low-bank RAM (3.5 KB headroom for monster/item pools, etc.)
#   $4000-$7FFF  CodeTank ROM (CODE segment, 16 KB - run-in-place)
#   $E000-$E2FF  map_buffer (MAPSEG, 768 B in high bank)
#   $E300-$EFFF  free high-bank RAM (3.3 KB headroom)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    MAP:   start = $E000, size = $0300, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    MAPSEG:   load = MAP,  type = bss;
}
