# cc65 linker config for TMS_Rogue inside the Codetank_GAMES2.rom
# lower bank. Code runs in place from $4000 (Rogue is the only game in
# the cartridge for now). The 8 KB Parmigiani DRAM target ($0280) was
# abandoned once the code outgrew the 3.5 kB low-bank CODE budget —
# this is now the only supported configuration.
#
# Parmigiani dual-bank RAM (preset 8 / standard P-LAB layout):
#   low bank  $0000-$0FFF, high bank $E000-$EFFF, hole $1000-$7FFF.
# Map buffer goes in the high bank to leave the low bank fully free
# for runtime BSS as MVP2/3 grow.
#
#   $0000-$001F  ZP scalars (lib's vdp_* + project tmp)
#   $0100-$01FF  6502 stack
#   $0200-$0FFF  free low-bank RAM (3.5 KB headroom for monster/item pools, etc.)
#   $4000-$7FFF  CodeTank ROM (CODE segment, 16 KB - run-in-place)
#   $E000-$E2FF  map_buffer (MAPSEG, 768 B in high bank)
#   $E300-$EFFF  free high-bank RAM (3.3 KB headroom)

MEMORY {
    # ZP grown from $20 → $30 (hp/food/monster scratch) → $40 (FOV
    # Bresenham scratch) → $50 (XP-driven progression: hp_max,
    # xp_atk_bonus, xp_def_bonus, hp_tick, atk_tick, def_tick) → $60
    # (recursive shadowcaster: oct_xx/xy/yx/yy + cast_* frame +
    # mul_a/b/tmp; replaces the lighter Bresenham scratch).
    # Wozmon uses $24-$2B for its line-editor state; we never return
    # to Wozmon (death = JMP $4000 cold-start, not WOZMON), so
    # trampling those is safe. Keeping headroom in $60-$FF is cheap
    # on cartridge.
    ZP:    start = $0000, size = $0060, type = rw, define = yes;
    MAP:   start = $E000, size = $0300, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    MAPSEG:   load = MAP,  type = bss;
}
