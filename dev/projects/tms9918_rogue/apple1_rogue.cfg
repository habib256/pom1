# cc65 linker config for TMS_Rogue on a STOCK 4 KB Apple 1 + TMS9918
# -----------------------------------------------------------------
# Memory layout (4 KB DRAM at $0000-$0FFF + Woz Monitor ROM):
#
#   $0000-$001F  ZP scalars (lib's vdp_* + project tmp)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed at runtime)
#   $0280-$0FFF  program code + sprite pattern data (CODE segment, 3.5 KB)
#
# MVP1: stub barely uses 200 B. Headroom is reserved for the upcoming
# tile pattern table (loaded once at boot from ROM into VRAM) and the
# bit-packed map buffer (768 B at $0500-$07FF in MVP2).

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $0280, size = $0D80, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
