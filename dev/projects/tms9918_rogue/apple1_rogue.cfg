# cc65 linker config for TMS_Rogue on an 8 KB P-LAB Apple 1 + TMS9918
# -------------------------------------------------------------------
# Parmigiani dual-bank RAM layout (matches preset 8 + every standard
# P-LAB Apple-1 / Replica-1 build): the 8 KB user RAM is SPLIT into a
# low bank at $0000-$0FFF and a high bank at $E000-$EFFF, with a hole
# at $1000-$7FFF where reads return $FF and writes are dropped under
# silicon-strict mode. Putting variables in the hole would silently
# break the game.
#
#   $0000-$001F  ZP scalars (lib's vdp_* + project tmp)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed at runtime)
#   $0280-$0FFF  program code + tileset + char_adventurer (CODE, 3.5 KB)
#   $E000-$E2FF  map_buffer (MAPSEG, 768 B in the high bank)
#   $E300-$EFFF  free RAM (3.3 KB headroom in high bank for MVP2/3 BSS)
#
# Total budget: code ≤ 3 456 B (low bank). With Quale's full 33-sprite
# characters lib that's a tight fit, so MVP1 inlines the 32 B player
# pattern locally rather than .importing char_adventurer_pat.

MEMORY {
    # ZP grown from $20 → $30 (hp/food/monster scratch) → $40 (FOV
    # Bresenham scratch) → $50 (XP-driven progression bytes). Wozmon
    # uses $24-$2B for its line-editor; we never return to it (death =
    # JMP $4000), so trampling is safe.
    ZP:    start = $0000, size = $0050, type = rw, define = yes;
    CODE:  start = $0280, size = $0D80, type = ro, define = yes, file = %O;
    MAP:   start = $E000, size = $0300, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    MAPSEG:   load = MAP,  type = bss;
}
