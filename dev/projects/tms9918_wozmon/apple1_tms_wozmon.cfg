# cc65 linker config for TMS_Wozmon_demo (Apple-1 + TMS9918, 8 KB DRAM).
# -----------------------------------------------------------------
#
#   $0000-$00FF  Zero page (driver+console own a small slice; rest free)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer (left intact)
#   $0280-$02FF  free for guest programs (left intact -- standard Apple-1
#                cassette load address)
#   $0300-$1FFF  CODE segment: demo + driver + console + 1 KB charmap
#                (~7.5 kB available, demo currently ~1.5 kB)
#   $1F00-$1FFF  BSS: 40-byte console scroll buffer at the very top
#
# Init blob deliberately at $0300 (not $0280) per plan: leaves $0280-$02FF
# free for guest programs that load at the standard Apple-1 cassette
# address, and avoids any surprise collision with Wozmon's IN buffer.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $0300, size = $1B00, type = ro, define = yes, file = %O;
    RAM:   start = $1E00, size = $0200, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = RAM,  type = bss;
}
