# cc65 linker config for TMS_SilTest in the Codetank_TOOLS.rom layout.
# Run-in-place from $4000-$7FFF (16 KB CodeTank ROM bank).
#
# The test program needs RAM for its IRQ marker + status snapshots + result
# chars (8 bytes total, see TMS_SilTest.asm BSS). 64 B of ZP scratch is
# enough for the print_string + per-test pointers.
#
#   $0000-$003F  Zero page (64 B)
#   $0100-$01FF  6502 stack
#   $0200-$027F  BSS (test scratch + IRQ marker, 128 B headroom)
#   $0280-$3FFF  free low-bank RAM (~15 KB)
#   $4000-$7FFF  CodeTank ROM bank (TMS_SilTest CODE + 1 KB charmap)
#
# Wozmon: flip CodeTank jumper to lower-bank, then `4000R`.

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    BSS:   start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    BSS:      load = BSS,  type = bss;
    CODE:     load = CODE, type = ro;
}
