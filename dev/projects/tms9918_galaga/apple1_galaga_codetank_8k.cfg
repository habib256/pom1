# cc65 linker config: TMS_Galaga in a CodeTank 8 kB lower-bank slot.
# -----------------------------------------------------------------
# Used by the dualslot8k layout where Galaga and Sokoban each get 8 kB
# inside the lower 16 kB bank ($4000-$5FFF for Galaga). Entry: 4000R.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $4000, size = $2000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
