# cc65 linker config for TMS_Galaga in the GAME1 menu-bank layout:
# Galaga lives in the second slot of the 16 kB CodeTank bank, $4100-$5FFF
# (7 936 B slot). The menu at $4000 jumps here.
#
#   $0000-$00FF  ZP scalars (110 B used)
#   $0100-$01FF  6502 stack
#   $0200-$0FFF  free RAM
#   $4000-$40FF  CodeTank menu (separate config)
#   $4100-$5FFF  Galaga code + inline data tables (CODE segment, 7 936 B)
#   $6000-$73FF  Sokoban     (separate config)
#   $7400-$7DFF  Snake       (separate config)

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $4100, size = $1F00, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
