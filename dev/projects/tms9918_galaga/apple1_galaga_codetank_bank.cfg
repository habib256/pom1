# cc65 linker config for TMS_Galaga in the GAME1 menu-bank layout:
# Galaga lives in the second slot of the 16 kB CodeTank bank, $4100-$60FF
# (8 192 B slot, bumped from 7 936 B in May 2026 when 24c silicon-strict
# pads pushed the binary just past the old slot). The menu at $4000 jumps
# here. Sokoban and Snake shift forward by 256 B + 512 B respectively to
# absorb the growth (see their own bank cfgs and codetank_menu.asm).
#
#   $0000-$00FF  ZP scalars (110 B used)
#   $0100-$01FF  6502 stack
#   $0200-$0FFF  free RAM
#   $4000-$40FF  CodeTank menu (separate config)
#   $4100-$60FF  Galaga code + inline data tables (CODE segment, 8 192 B)
#   $6100-$75FF  Sokoban     (separate config, slot grew to 5 376 B)
#   $7600-$7FFF  Snake       (separate config, moved up by 512 B)

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $4100, size = $2100, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
