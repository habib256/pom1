# cc65 linker config for TMS_Galaga in the menu-bank layout: Galaga
# lives in the second slot of the 16 kB CodeTank bank, between $4100
# and $5DFF (7 424 B headroom). The menu at $4000 jumps here.
#
#   $0000-$00FF  ZP scalars (110 B used)
#   $0100-$01FF  6502 stack
#   $0200-$0FFF  free RAM
#   $4000-$40FF  CodeTank menu (NOT here - separate config)
#   $4100-$5DFF  Galaga code + inline data tables (CODE segment)

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $4100, size = $1D00, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
