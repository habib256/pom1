# Project-local linker config for Little Tower v1.0.
# ---------------------------------------------------
# Little Tower's text adventure (~6 KB binary) doesn't fit in the
# default 4 KB CODE budget. Stock 8 KB DRAM Apple-1 (or any preset
# with at least 8 KB RAM) handles it cleanly.
#
# Memory layout:
#   $0000-$0022  Zero page (35 bytes)
#   $0280-$1F7F  Code + data (7 936 bytes, output file)

MEMORY {
    ZP:     start = $0000, size = $0023, type = rw, define = yes;
    CODE:   start = $0280, size = $1D00, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
