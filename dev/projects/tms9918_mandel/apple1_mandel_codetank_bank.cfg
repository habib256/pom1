# cc65 linker config for TMS_Mandel in the Codetank_GAME3.rom upper-bank
# layout. Mandel occupies the third slot of the upper 16 kB bank,
# $4900-$50FF (2 048 B slot, currently ~1 571 B). The GAME3 upper menu
# at $4000 JMPs here.
#
# Mandel's square-tables live at absolute $0C00 (sq_lo) and $0D00
# (sq_hi) — page-aligned RAM, declared in the .asm at boot. Inside the
# Parmigiani dual-bank low RAM ($0000-$0FFF) so the strict-OOR check
# accepts them. RAM allocations (sq_lo / sq_hi) are NOT in this cfg.
#
#   $0000-$004F  ZP scalars (RAM, project)
#   $0100-$01FF  6502 stack
#   $0C00-$0CFF  sq_lo (page-aligned, built at boot)
#   $0D00-$0DFF  sq_hi (page-aligned, built at boot)
#   $4000-$40FF  GAME3 upper menu (separate config)
#   $4100-$48FF  Life    (separate config)
#   $4900-$50FF  Mandel code (CODE segment, this config — 2 048 B slot)
#   $5100-$58FF  Plasma  (separate config)
#   $5900-$7FFF  free (reserved)

MEMORY {
    ZP:    start = $0000, size = $0050, type = rw, define = yes;
    CODE:  start = $4900, size = $0800, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
