# cc65 linker config for TMS_Split in the Codetank_TEST.rom upper-bank
# layout. Split occupies the third slot of the upper 16 kB bank,
# $4500-$48FF (1 024 B slot, currently ~588 B). The test-menu at $4000
# JMPs here.
#
# tms9918_5strigger.asm declares a small BSS slot (1 byte); we keep the
# RW window at $0F80-$0FFF as in the stock Split build.
#
#   $0000-$001F  ZP scalars (RAM, project + lib's vdp_*)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard buffer
#   $0280-$0F7F  free RAM
#   $0F80-$0FFF  BSS (128 B — 1 byte used by tms9918_5strigger)
#   $4000-$40FF  test menu  (separate config)
#   $4100-$44FF  Clone      (separate config — 1 024 B slot)
#   $4500-$48FF  Split code (CODE segment, this config — 1 024 B slot)
#   $4900-$7FFF  free upper-bank slot (reserved)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $4500, size = $0400, type = ro, define = yes, file = %O;
    BSS:   start = $0F80, size = $0080, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
