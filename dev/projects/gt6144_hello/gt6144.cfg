# cc65 linker config for Apple 1 + SWTPC GT-6144 Graphic Terminal
#
# Memory layout:
#   $0000-$001F  Zero page (32 bytes)
#   $0300-$0FFF  Code + data (output file, max ~3.3 KB)
#   $1000+       Runtime RAM grids (hardcoded absolute in .asm)
#
# Target preset: "Apple-1 + SWTPC GT-6144 Graphic Terminal (1976)"
# which ships with 8 KB RAM ($0000-$1FFF).

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    CODE:   start = $0300, size = $0D00, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
