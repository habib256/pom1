# cc65 linker config for Apple 1 Chess (GEN2 HGR variant, v0.5)
# -----------------------------------------------------------------
# Target: Parmigiani 8 KB dual-bank Apple-1 (4 KB at $0000-$0FFF + 4 KB at
# $E000-$EFFF) plus the Uncle Bernie GEN2 HGR card. POM1 preset 12.
#
# Layout philosophy (matches dev/cc65/apple1_gen2.cfg single-bank standard):
# main code lives in the high bank ($E000+) so users boot the program by
# typing `E000R` — the same gesture they use for every other HGR project.
# Chess is the only HGR title that doesn't fit a single 4 KB bank, so the
# engine (~3.2 KB of pure subroutine library) is relegated to the low bank
# at $0280-$0FFF and entered via JSR from the high-bank variant code. The
# 0x88 board + state lives in the high bank's BSS tail.
#
# Memory layout:
#   $0000-$003F  Zero page (64 B)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer
#   $0280-$0FFF  ENGINE — chess engine code (3 840 B max, .lo file)
#   $1000-$1FFF  (no RAM on stock Apple-1)
#   $2000-$3FFF  GEN2 HGR framebuffer (RESERVED, written via STA)
#   $E000-$EEFF  CODE — variant code + chess_text_io (3 840 B max, .hi file)
#   $EF00-$EFFF  BOARDST — 0x88 board + state (256 B, BSS)
#
# Run via Wozmon: `E000R`.

MEMORY {
    ZP:       start = $0000, size = $0040, type = rw, define = yes;
    CODELOW:  start = $0280, size = $0D80, type = ro, define = yes, file = "%O.lo";
    # $1000-$1FFF  no RAM
    # $2000-$3FFF  GEN2 framebuffer
    CODEHIGH: start = $E000, size = $0F00, type = ro, define = yes, file = "%O.hi";
    BOARD:    start = $EF00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    ENGINE:   load = CODELOW,  type = ro;
    CODE:     load = CODEHIGH, type = ro;
    BOARDST:  load = BOARD,    type = bss;
}
