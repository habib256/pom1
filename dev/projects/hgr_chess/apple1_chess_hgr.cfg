# cc65 linker config for Apple 1 Chess (GEN2 HGR variant, v0.4)
# -----------------------------------------------------------------
# STOCK 8 KB Apple-1 dual-bank RAM map (per Parmegiani) + GEN2 HGR card.
# GEN2 maps an 8 KB framebuffer at $2000-$3FFF (separate hardware on the
# card). Host RAM remains the standard 4 KB + 4 KB layout. The
# $1000-$1FFF gap stays bus-only (no RAM there on a stock Apple-1).
#
# Memory layout:
#   $0000-$003F  Zero page (64 B)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer
#   $0280-$0FFF  CODE — variant code + tile bitmaps (3456 B)
#   $1000-$1FFF  (no RAM on stock Apple-1)
#   $2000-$3FFF  GEN2 HGR framebuffer (RESERVED, written via STA)
#   $E000-$EEFF  ENGINE — chess engine code (3840 B)
#   $EF00-$EFFF  BOARDST — 0x88 board + state (256 B)
#
# Target hardware: Apple-1 with the dual-bank 8 KB RAM (4K low + 4K high)
# AND an Uncle Bernie GEN2 HGR card. POM1 preset 13 (Uncle Bernie's
# GEN2) is the closest match. Preset 0 is 4K-only and code won't fit.

MEMORY {
    ZP:       start = $0000, size = $0040, type = rw, define = yes;
    CODELOW:  start = $0280, size = $0D80, type = ro, define = yes, file = "%O.lo";
    # $1000-$1FFF  no RAM
    # $2000-$3FFF  GEN2 framebuffer
    CODEHIGH: start = $E000, size = $0F00, type = ro, define = yes, file = "%O.hi";
    BOARD:    start = $EF00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    CODE:     load = CODELOW,  type = ro;
    ENGINE:   load = CODEHIGH, type = ro;
    BOARDST:  load = BOARD,    type = bss;
}
