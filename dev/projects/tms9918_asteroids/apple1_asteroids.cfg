# cc65 linker config for TMS_Asteroids -- 16 KB DRAM Apple-1 build.
# -----------------------------------------------------------------
#   $0000-$003F  ZP scalars (ZEROPAGE, 64 B)
#   $0100-$01FF  6502 stack
#   $0200-$027F  BSS (game state, fits in 128 B)
#   $0280-$3FFF  CODE: program code + RO data (~15.5 kB headroom)
#   $4000+       I/O / TMS9918 / cassette window — off-limits
#
# No PROC segment (Asteroids has no proc storage like LOGO does), and no
# LBUF (no command-line input). All BSS lives in a single $0200-$027F
# region.

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    BSS:   start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $0280, size = $3D80, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    BSS:      load = BSS,  type = bss;
    CODE:     load = CODE, type = ro;
}
