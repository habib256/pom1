# cc65 linker config for TMS_Chess inside Codetank_GAME2.rom upper bank.
# Run-in-place from $4000-$7FFF (16 KB), with BOARDST in the high RAM
# bank at $EF00. CODE (main/UI) + ENGINE (chess engine) packed
# consecutively into the single ROM block.
#
# Apple-1 8 KB dual-bank (Parmegiani) layout:
#   $0000-$003F  Zero page (64 B)
#   $0100-$01FF  6502 stack
#   $0200-$0FFF  free low-bank RAM
#   $4000-$7FFF  CodeTank ROM upper bank (CODE + ENGINE)
#   $E000-$EEFF  free high-bank RAM
#   $EF00-$EFFF  BOARDST (0x88 board + state, 256 B)

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
    BOARD: start = $EF00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,    type = zp;
    CODE:     load = CODE,  type = ro;
    ENGINE:   load = CODE,  type = ro;
    BOARDST:  load = BOARD, type = bss;
}
