<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="POM1 v1.9.1 — Apple 1 emulator in the browser (WebAssembly). MOS 6502, ACI cassette, GEN2 HGR, P-LAB TMS9918, A1-SID (cycle-accurate libresidfp 6581/8580), microSD.">
<meta name="author" content="Arnaud Verhille">
<title>POM1 v1.9.1 — Apple 1 Emulator</title>
<link rel="icon" type="image/png" href="pic/icon.png">
<style>
  html, body { margin: 0; padding: 0; background: #000; color: #cfd0e8;
               font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
               overflow: hidden; height: 100%; }

  /* Top status pill — download progress while the ~40 MB MEMFS package loads. */
  #status   { position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
              max-width: min(640px, calc(100vw - 32px)); padding: 10px 14px;
              background: rgba(12,12,20,0.92); border: 1px solid #2a2a44;
              border-radius: 8px; font-size: 13px; line-height: 1.4;
              pointer-events: none; box-shadow: 0 8px 30px rgba(0,0,0,0.45);
              z-index: 10; }
  #status.hidden { display: none; }
  .pill     { display: inline-block; padding: 2px 8px; border-radius: 9px;
              background: #1f1f33; color: #8fdf9f; font-size: 11px; margin-right: 6px; }
  #progress { display: inline-block; width: 220px; height: 6px;
              background: #2a2a36; border-radius: 3px; overflow: hidden;
              vertical-align: middle; margin-left: 6px; }
  #progress > div { background: #8fdf9f; height: 100%; width: 0%;
                    transition: width 0.1s linear; }

  /* Fullscreen "PLEASE WAIT" splash — stays until the first frame is painted. */
  #bootSplash { position: fixed; inset: 0; display: flex; flex-direction: column;
                align-items: center; justify-content: center; gap: 14px;
                background: radial-gradient(ellipse at center, #101028 0%, #000 70%);
                color: #f0f0f0; z-index: 5; transition: opacity 0.25s ease; }
  #bootSplash.hidden { opacity: 0; pointer-events: none; }
  #bootSplash .apple { font-size: 3rem; line-height: 1; }
  #bootSplash .wait  { font: 700 clamp(28px, 7vw, 64px) ui-monospace, monospace;
                       letter-spacing: 0.12em; color: #8fdf9f; }
  #bootSplash .sub   { font-size: 0.85rem; color: #8a8aa8; text-align: center;
                       max-width: 420px; line-height: 1.5; }
  #bootSplash .spinner { width: 40px; height: 40px; border: 4px solid #2a2a44;
                         border-top-color: #8fdf9f; border-radius: 50%;
                         animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Canvas drawn at its native preset pixel size (the WASM loop sets the
     element width/height) and centered. Fullscreen request targets #canvas. */
  canvas    { display: block; margin: auto; position: absolute; inset: 0;
              max-width: 100vw; max-height: 100vh; background: #000;
              cursor: default; outline: none; }
  canvas:fullscreen, canvas:-webkit-full-screen {
              width: 100vw; height: 100vh; max-width: 100vw; max-height: 100vh; }

  #err      { position: fixed; left: 16px; right: 16px; top: 16px;
              padding: 12px 16px; background: #4a1a1a; color: #ffe;
              border-radius: 6px; font-family: ui-monospace, monospace;
              font-size: 12px; white-space: pre-wrap; display: none; z-index: 20; }
</style>
</head>
<body>

<div id="status">
  <span class="pill">POM1 WASM</span>
  <span id="statusMsg">Loading POM1: downloading assets…</span>
  <span id="progress"><div></div></span>
</div>

<div id="err"></div>

<div id="bootSplash">
  <div class="apple">🍎</div>
  <div class="wait">PLEASE WAIT</div>
  <div class="spinner"></div>
  <div class="sub">POM1 v1.9.1 — Apple 1 Emulator · by Arnaud Verhille ·
    loading ~40 MB of ROMs, fonts, software and demo cassettes…</div>
</div>

<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

<script>
  const statusBox  = document.getElementById('status');
  const statusMsg  = document.getElementById('statusMsg');
  const progressEl = document.querySelector('#progress > div');
  const errEl      = document.getElementById('err');

  function setStatus(msg) { if (statusMsg) statusMsg.textContent = msg; }
  function setProgress(num, total) {
    if (!progressEl || !total) return;
    progressEl.style.width = Math.min(100, (100 * num / total)) + '%';
  }

  // Called from C++ (main_imgui.cpp) right after the first glfwSwapBuffers, so
  // the Apple 1 screen is genuinely visible before the splash disappears — not
  // merely when the MEMFS preload finished downloading.
  window.pom1FirstFrameReady = function() {
    setProgress(1, 1);
    setStatus("POM1 ready.");
    document.getElementById('bootSplash').classList.add('hidden');
    setTimeout(() => { statusBox.classList.add('hidden'); }, 250);
  };

  var Module = {
    canvas: document.getElementById('canvas'),
    print:    (text) => { console.log(text); },
    printErr: (text) => { console.warn(text); },
    setStatus: (text) => {
      if (!text) { setStatus("Loading POM1: initializing the emulator…"); return; }
      // Emscripten posts "prefix (loaded/total)" during the data download.
      const m = text.match(/\((\d+(?:\.\d+)?)\/(\d+)\)/);
      if (m) {
        setProgress(parseFloat(m[1]), parseFloat(m[2]));
        setStatus("Loading POM1: downloading assets… " +
                  Math.round(100 * parseFloat(m[1]) / parseFloat(m[2])) + "%");
      } else {
        setStatus("Loading POM1: " + text);
      }
    },
    monitorRunDependencies: function(left) {
      if (left === 0) {
        setProgress(1, 1);
        setStatus("Loading POM1: assets loaded, initializing the emulator…");
      }
    },
    onAbort: function(reason) {
      errEl.style.display = 'block';
      errEl.textContent = "POM1 failed while loading or initializing:\n" + reason;
    },
  };

  window.addEventListener('unhandledrejection', event => {
    errEl.style.display = 'block';
    errEl.textContent = "POM1 failed while loading or initializing:\n" +
      (event.reason && (event.reason.stack || event.reason.message || event.reason));
  });
</script>
<script async type="text/javascript" src="POM1.js"></script>
</body>
</html>
