<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="POM1 v1.7 — Apple 1 emulator in the browser (WebAssembly).">
  <title>POM1 v1.7 — Apple 1 Emulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Canvas ── */
    #canvas-container {
      overflow: hidden;
      background: #000;
      width: fit-content;
      max-width: 100vw;
      height: fit-content;
      max-height: 100vh;
    }
    canvas.emscripten {
      display: block;
      width: auto;
      height: auto;
      max-width: 100vw;
      max-height: 100vh;
      cursor: default !important;
    }

    /* ── Fullscreen ── */
    #canvas-container:fullscreen,
    #canvas-container:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
    }
    #canvas-container:fullscreen canvas,
    #canvas-container:-webkit-full-screen canvas {
      width: 100%;
      height: 100%;
    }

    /* ── Status / Progress ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 8px;
      min-height: 22px;
      font-family: system-ui, sans-serif;
      font-size: 0.8rem;
      color: #9a9ab5;
    }
    #progress { width: 200px; height: 12px; display: none; accent-color: #6c9; }
    .spinner {
      width: 18px; height: 18px;
      border: 3px solid #3a3a55;
      border-top-color: #8fdf9f;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="canvas-container">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <div id="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="status">Loading...</span>
    <progress id="progress" value="0" max="100"></progress>
  </div>

  <script>
    var statusElement  = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var spinnerElement  = document.getElementById('spinner');

    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),

      print: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.warn(text);
      },

      setStatus: function(text) {
        if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
        if (text === Module.setStatus.last.text) return;
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - Module.setStatus.last.time < 30) return;
        Module.setStatus.last.time = now;
        Module.setStatus.last.text = text;

        if (m) {
          progressElement.value = parseInt(m[2]) * 100;
          progressElement.max = parseInt(m[4]) * 100;
          progressElement.style.display = 'inline';
          text = m[1];
        } else {
          progressElement.style.display = 'none';
        }
        statusElement.innerHTML = text;
        spinnerElement.style.display = text ? 'block' : 'none';
        if (!text && !m) document.getElementById('status-bar').style.display = 'none';
      },

      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : '');
        if (!left) document.getElementById('status-bar').style.display = 'none';
      },
      totalDependencies: 0
    };

    Module.setStatus('Downloading…');
    window.onerror = function() {
      Module.setStatus('Error — see browser console');
      spinnerElement.style.display = 'none';
    };
  </script>
  <script async type="text/javascript" src="pom1_imgui.js"></script>
</body>
</html>
