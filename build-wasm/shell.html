<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POM1 v1.6 — Apple 1 Emulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0 10px;
      user-select: none;
    }
    #header .apple {
      font-size: 2.2rem;
    }
    #header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    #header h1 span {
      color: #7c7c9c;
      font-weight: 400;
      font-size: 0.85rem;
      margin-left: 6px;
    }

    /* ── Canvas ���─ */
    #canvas-container {
      border: 2px solid #333;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      background: #000;
      width: fit-content;
      max-width: min(96vw, 1280px);
      height: fit-content;
      max-height: min(92vh, 900px);
      margin: 0 auto;
      min-width: 320px;
      min-height: 240px;
    }
    canvas.emscripten {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: min(92vh, 900px);
      cursor: default !important;
    }

    /* ── Fullscreen ── */
    #canvas-container:fullscreen,
    #canvas-container:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }
    #canvas-container:fullscreen canvas,
    #canvas-container:-webkit-full-screen canvas {
      width: 100%;
      height: 100%;
    }

    /* ── Status / Progress ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 16px;
      min-height: 22px;
      font-size: 0.8rem;
      color: #888;
    }
    #progress { width: 180px; height: 12px; display: none; }
    .spinner {
      width: 18px; height: 18px;
      border: 3px solid #444;
      border-top-color: #8f8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    #footer {
      margin-top: auto;
      padding: 10px;
      font-size: 0.7rem;
      color: #555;
    }
  </style>
</head>
<body>

  <!-- Header: POM1 branding instead of Emscripten logo -->
  <div id="header">
    <div class="apple">&#127822;</div>
    <h1>POM1 v1.5<span>Apple 1 Emulator &mdash; WebAssembly / Emscripten</span></h1>
  </div>

  <!-- Canvas -->
  <div id="canvas-container">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <!-- Status (loading indicator, no terminal) -->
  <div id="status-bar">
    <div class="spinner" id="spinner"></div>
    <span id="status">Loading...</span>
    <progress id="progress" value="0" max="100"></progress>
  </div>

  <div id="footer">POM1 &copy; 2000-2026 Verhille Arnaud &mdash; GPL v3</div>

  <script>
    // ── Module configuration ──
    var statusElement  = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var spinnerElement  = document.getElementById('spinner');

    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),

      print: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.warn(text);
      },

      setStatus: function(text) {
        if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
        if (text === Module.setStatus.last.text) return;
        // Throttle progress updates
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        var now = Date.now();
        if (m && now - Module.setStatus.last.time < 30) return;
        Module.setStatus.last.time = now;
        Module.setStatus.last.text = text;

        if (m) {
          progressElement.value = parseInt(m[2]) * 100;
          progressElement.max = parseInt(m[4]) * 100;
          progressElement.style.display = 'inline';
          text = m[1];
        } else {
          progressElement.style.display = 'none';
        }
        statusElement.innerHTML = text;
        spinnerElement.style.display = text ? 'block' : 'none';
      },

      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'Ready.');
      },
      totalDependencies: 0
    };

    Module.setStatus('Downloading...');
    window.onerror = function(event) {
      Module.setStatus('Error — see browser console');
      spinnerElement.style.display = 'none';
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
