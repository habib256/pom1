# Release packaging — build POM1 on each native OS and produce a distributable
# that BUNDLES the cc65 toolchain so the in-app DevBench (Pom1BenchHost) compiles
# both of its native languages out of the box, with no system cc65 on PATH:
#
#   asm  →  ca65 + ld65
#   C    →  cl65 + cc65  (+ the share/cc65 runtime, resolved via CC65_HOME)
#
# cc65 binaries can't be cross-built, so there is one native job per OS. Each job
# stages the toolchain, runs the matching packager in STRICT mode
# (POM1_REQUIRE_CC65=1 → the packager fails if cc65 didn't make it in), verifies
# the staged tree, and uploads the artifact. On a version tag the three packages
# (plus a SHA256SUMS.txt manifest) are attached to the GitHub Release.
#
# Triggers: push a version tag to cut a release; "Run workflow" for a dry run
# (artifacts only, no Release). Both tag conventions used on this repo fire:
# the `v`-prefixed form (v1.8.6) AND the bare numeric form (1.9.2, 1.9.0) — the
# two most recent releases were tagged WITHOUT the `v`, so a `v*`-only filter
# would have skipped them.
name: Release packages

on:
  push:
    tags:
      - 'v[0-9]*'        # v1.9.2
      - '[0-9]*'         # 1.9.2  (bare numeric tag — current convention)
  workflow_dispatch:

permissions:
  contents: write          # publish job attaches packages to the Release

env:
  POM1_REQUIRE_CC65: "1"   # every packager must end with a verified asm+C cc65 bundle
  IMGUI_TAG: v1.92.7       # pinned Dear ImGui release (matches ci.yml)

jobs:
  # ---------------------------------------------------- normalize version ----
  # Single source of truth for the package version. Strips a leading `v` from
  # the tag so the value is the bare number (1.9.2) regardless of which tag
  # convention was pushed (v1.9.2 vs 1.9.2) — each packager prepends its own
  # `v`, so without this a v-prefixed tag would yield POM1-macOS-vv1.9.2.dmg.
  # Empty on workflow_dispatch (no tag) → packagers fall back to their default.
  version:
    runs-on: ubuntu-latest
    outputs:
      pom1_version: ${{ steps.v.outputs.pom1_version }}
    steps:
      - id: v
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          if [ "$REF_TYPE" = "tag" ]; then
              echo "pom1_version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
              echo "pom1_version=" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------- Linux ----
  # The AppImage is built INSIDE the pinned bionic (glibc 2.27) builder image so
  # it links against glibc 2.27 and runs on Linux Mint 19.x and everything newer
  # (an AppImage never bundles glibc, so its floor == the build image's glibc;
  # building on ubuntu-latest previously stamped GLIBC_2.34 and broke pre-2.34
  # systems). The toolchain is FROZEN in ghcr.io/<owner>/pom1-bionic-builder
  # (packaging/linux/Dockerfile.bionic, built by the build-bionic-image workflow)
  # so this job downloads no toolchain and never touches bionic's flaky EOL apt
  # mirrors — reproducible by image digest. Build that image first if it's missing.
  #
  # `docker run` rather than a `container:` key because GitHub's node20 actions
  # (checkout@v4, upload-artifact@v4) need glibc >= 2.28 — one notch above bionic's
  # 2.27 — so they can't run inside a bionic `container:`. Actions run on the host;
  # the repo is bind-mounted in. Full recipe: packaging/linux/build_in_bionic.sh.
  linux:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read          # pull the builder image from GHCR
    env:
      # PINNED BY DIGEST for reproducibility — this exact frozen toolchain, not a
      # moving tag. After rebuilding via the build-bionic-image workflow, re-pin to
      # the new digest it prints (the `:bionic` tag still moves for convenience).
      BUILDER_IMAGE: ghcr.io/habib256/pom1-bionic-builder@sha256:c44b786517f041f779b082b813e84a17b141db3983fc0b28f2c3e4deedeb4cca
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR (pull the builder image)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build POM1 + AppImage in the pinned bionic builder (cc65 bundled, strict)
        env:
          POM1_VERSION: ${{ needs.version.outputs.pom1_version }}
        run: |
          # Lowercase the owner — GHCR repositories must be lowercase.
          IMAGE="$(echo "$BUILDER_IMAGE" | tr '[:upper:]' '[:lower:]')"
          docker pull "$IMAGE"
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e POM1_VERSION -e POM1_REQUIRE_CC65 -e IMGUI_TAG \
            "$IMAGE" \
            bash /work/packaging/linux/build_in_bionic.sh

      - name: Verify cc65 inside the staged AppDir (asm + C)
        run: tools/verify_cc65_bundle.sh build-appimage/AppDir/usr/share/POM1/cc65

      - name: Verify the AppImage — glibc floor <= 2.27 AND ET_EXEC runtime
        run: |
          set -euo pipefail
          # appimagetool emits a 0755 (world-readable/executable) file; it is
          # root-owned here because the build ran as root in the container, so we
          # only read/execute it — never chmod (would EPERM as the runner user).
          APP=$(ls dist/*.AppImage | head -1)
          # The runtime must be ELF ET_EXEC (not the new static-pie ET_DYN) or
          # AppImageLauncher rejects it as "type -1" — this is the regression the
          # AppImageKit appimagetool switch fixed; assert it never comes back.
          TYPE=$(readelf -h "$APP" | awk -F'[ :]+' '/^ *Type:/ {print $3; exit}')
          echo "AppImage runtime ELF type: ${TYPE}"
          test "$TYPE" = "EXEC" \
            || { echo "ERROR: AppImage runtime is $TYPE, not EXEC — AppImageLauncher will reject it"; exit 1; }
          # Magic AI\x02 at offset 8 = valid AppImage type 2.
          MAGIC=$(xxd -s 8 -l 3 -p "$APP")
          test "$MAGIC" = "414902" \
            || { echo "ERROR: bad AppImage magic $MAGIC (expected 414902)"; exit 1; }
          "$APP" --appimage-extract >/dev/null
          BIN=squashfs-root/usr/bin/POM1
          # Highest GLIBC_x.y version any symbol in the binary requires.
          MAX=$(objdump -T "$BIN" 2>/dev/null \
                | grep -oE 'GLIBC_[0-9]+\.[0-9]+' \
                | sort -V | tail -1)
          echo "Highest glibc symbol required by POM1: ${MAX:-none}"
          # 2.27 is the bionic floor; anything higher would break Mint 19.x.
          test "$(printf '%s\nGLIBC_2.27\n' "$MAX" | sort -V | tail -1)" = "GLIBC_2.27" \
            || { echo "ERROR: AppImage requires ${MAX} > GLIBC_2.27"; exit 1; }
          echo "OK: ET_EXEC + magic + glibc floor <= 2.27"

      - uses: actions/upload-artifact@v4
        with:
          name: POM1-linux-AppImage
          path: dist/*.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------- macOS ----
  macos:
    needs: version
    # Intel build — runs on Apple Silicon via Rosetta too. macos-13 was retired
    # by GitHub (Dec 2025) and the label now queues forever (run 29819799811 sat
    # 24 h without a runner); macos-15-intel is the supported Intel image.
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (glfw + cc65)
        run: brew install glfw cc65

      - name: Fetch Dear ImGui (pinned)
        run: git clone --depth 1 --branch "$IMGUI_TAG" https://github.com/ocornut/imgui.git

      - name: Stage cc65 bundle (asm ca65/ld65 + C cl65/cc65)
        run: tools/build_cc65_bundle.sh --out dist/cc65-bundle

      - name: Package .app + .dmg (cc65 bundled, strict)
        env:
          POM1_VERSION: ${{ needs.version.outputs.pom1_version }}
        run: ./package_macos_release.sh

      - name: Verify cc65 inside the staged .app (asm + C)
        run: tools/verify_cc65_bundle.sh dist/POM1.app/Contents/Resources/cc65

      - uses: actions/upload-artifact@v4
        with:
          name: POM1-macOS-dmg
          path: dist/*.dmg
          if-no-files-found: error

  # -------------------------------------------------------------- Windows ----
  windows:
    needs: version
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Dear ImGui (pinned)
        run: git clone --depth 1 --branch ${{ env.IMGUI_TAG }} https://github.com/ocornut/imgui.git

      - name: Install GLFW via vcpkg
        run: vcpkg install glfw3:x64-windows

      - name: Install LLVM MinGW (compile cc65 from source)
        run: winget install -e --id MartinStorsjo.LLVM-MinGW.UCRT --accept-package-agreements --accept-source-agreements

      - name: Stage cc65 bundle (compile from source; asm + C + ar65)
        shell: pwsh
        run: .\packaging\windows\build_cc65.ps1 -Out dist\cc65-bundle

      - name: Configure + build (Release, vcpkg toolchain)
        shell: cmd
        run: |
          cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release -j

      - name: Package ZIP (cc65 bundled, strict)
        shell: cmd
        env:
          POM1_VERSION: ${{ needs.version.outputs.pom1_version }}
        run: |
          set "VCPKG_ROOT=%VCPKG_INSTALLATION_ROOT%"
          set "CC65_HOME=%CD%\dist\cc65-bundle\cc65\share\cc65"
          call package_windows_release.bat

      - name: Verify cc65 inside the staged package (asm + C)
        shell: bash
        run: tools/verify_cc65_bundle.sh dist/POM1-Windows/cc65

      - name: Verify VC++ runtime is bundled app-local (base-Windows launch)
        shell: bash
        run: |
          set -eu
          for d in vcruntime140.dll vcruntime140_1.dll msvcp140.dll; do
            test -f "dist/POM1-Windows/$d" || { echo "MISSING app-local VC++ runtime: $d"; exit 1; }
          done
          echo "VC++ runtime bundled app-local: OK"

      - uses: actions/upload-artifact@v4
        with:
          name: POM1-Windows-zip
          path: dist/*.zip
          if-no-files-found: error

  # ------------------------------------------------ attach to the Release ----
  publish:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach packages + checksums to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          # Flatten the per-job artifact dirs into one staging dir (clean basenames
          # so the checksum file lists e.g. "POM1-macOS-v1.9.2.dmg", not a nested
          # download path). Each package basename is already unique per OS.
          mkdir -p staging
          find artifacts -type f \( -name '*.AppImage' -o -name '*.dmg' -o -name '*.zip' \) \
               -exec cp -v {} staging/ \;
          shopt -s nullglob
          FILES=(staging/*.AppImage staging/*.dmg staging/*.zip)
          if [ "${#FILES[@]}" -eq 0 ]; then echo "No packages found to publish."; exit 1; fi
          # SHA-256 manifest so downloaders can verify integrity (sha256sum -c).
          # List only the basenames actually present (cd into staging so the
          # manifest carries bare filenames).
          ( cd staging && sha256sum -- "${FILES[@]#staging/}" > SHA256SUMS.txt )
          cat staging/SHA256SUMS.txt
          FILES+=(staging/SHA256SUMS.txt)
          if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" "${FILES[@]}" --clobber
          else
              gh release create "$TAG" "${FILES[@]}" --generate-notes --title "POM1 $TAG"
          fi
