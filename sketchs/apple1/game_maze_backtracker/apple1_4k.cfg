# Apple 1 linker config with a 4 KB code segment.
# Standard 4 KB CODE budget for text-mode programs (and TMS9918, whose VRAM is
# off the bus) that don't need HGR RAM.
#
# Memory layout:
#   $0000-$0022  Zero page (35 bytes)
#   $0280-$127F  Code + data (4096 bytes, output file)

MEMORY {
    ZP:     start = $0000, size = $0023, type = rw, define = yes;
    CODE:   start = $0280, size = $1000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
