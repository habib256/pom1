# cc65 linker config for Apple-1 Integer BASIC (Woz / Replica-1 BASIC ROM, $E000).
# -----------------------------------------------------------------
# integer-basic.s carries `.org $E000` and a single CODE segment; this cfg just
# parks it in a $1000 region so ld65 emits the flat $E000-$EFFF ROM image. Builds
# byte-for-byte identical to roms/basic.rom (POM1's $E000 Integer BASIC) — verified
# with `cmp`. Cold start $E000 (JMP $E2B0), warm start $E2B3 (the classic E2B3R).
#
#   ca65 -o integer-basic.o integer-basic.s
#   ld65 -C integer_basic.cfg -o basic.rom integer-basic.o
#
# Source: Eric Smith's disassembly (brouhaha.com), reassembled for cc65 by Jeff
# Tranter (github.com/jefftranter/6502, asm/a1basic) — matches the Apple Replica-1
# BASIC ROM. This is the REFERENCE for the Integer BASIC tokeniser
# (BasicTokeniserInteger): token table (syntabl2), line format, run_warm $E836.

MEMORY {
    BASROM: start = $E000, size = $1000, type = rw, fill = yes, file = %O;
}

SEGMENTS {
    CODE: load = BASROM, type = ro;
}
