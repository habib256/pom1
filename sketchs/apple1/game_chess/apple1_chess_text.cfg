# cc65 linker config for Apple 1 Chess (text mode, v0.4)
# -----------------------------------------------------------------
# STOCK 8 KB Apple-1 dual-bank RAM map (per Claudio Parmegiani:
# "My Replicas (just like 99% of the Originals) has the standard RAM
#  8 kB mapping: 4 kB between $0000 and $0FFF, 4 kB between $E000 and
#  $EFFF" — NOT a contiguous 8 KB at $0000-$1FFF).
#
# Memory layout:
#   $0000-$003F  Zero page (64 B)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer
#   $0280-$0FFF  CODE — variant code (renderer + I/O + main loop, 3456 B)
#   $E000-$EEFF  ENGINE — chess engine code (3840 B)
#   $EF00-$EFFF  BOARDST — 0x88 board + game state + AI/undo BSS (256 B)
#
# Target hardware: Briel Replica-1 or any Apple-1 with the canonical
# "4K low + 4K high" dual-bank RAM (the typical 1976+ configuration).
# POM1 preset 3 (Bare Apple-1 July 1976) is 4K-only — code won't fit;
# pick a preset with the upper bank such as the Replica-1 ones (or any
# preset with Integer BASIC, since presence of BASIC ROM at $E000
# implies RAM is mapped there too — POM1 lets us overwrite it; on real
# hardware you'd cold-start without BASIC loaded).
#
# Wozmon's R command at $0280 boots the splash from the lower bank.

MEMORY {
    ZP:       start = $0000, size = $0040, type = rw, define = yes;
    CODELOW:  start = $0280, size = $0D80, type = ro, define = yes, file = "%O.lo";
    CODEHIGH: start = $E000, size = $0F00, type = ro, define = yes, file = "%O.hi";
    BOARD:    start = $EF00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    CODE:     load = CODELOW,  type = ro;
    ENGINE:   load = CODEHIGH, type = ro;
    BOARDST:  load = BOARD,    type = bss;
}
