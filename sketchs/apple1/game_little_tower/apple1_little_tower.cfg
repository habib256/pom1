# Project-local linker config for Little Tower v1.0.
# ---------------------------------------------------
# Little Tower's text adventure (~6 KB total) doesn't fit in the
# default 4 KB CODE budget. Stock 8 KB dual-bank Apple-1 maps the
# lower bank at $0000-$0FFF and the upper bank at $E000-$EFFF, so keep
# executable code low and place the bulky strings high.
#
# Memory layout:
#   $0000-$0022  Zero page (35 bytes)
#   $0280-$0FFF  Code (3 456 bytes, output file .lo)
#   $E000-$EFFF  Text data (4 096 bytes, output file .hi)

MEMORY {
    ZP:       start = $0000, size = $0023, type = rw, define = yes;
    CODELOW:  start = $0280, size = $0D80, type = ro, define = yes, file = "%O.lo";
    CODEHIGH: start = $E000, size = $1000, type = ro, define = yes, file = "%O.hi";
}

SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    CODE:     load = CODELOW,  type = ro;
    RODATA:   load = CODEHIGH, type = ro;
}
