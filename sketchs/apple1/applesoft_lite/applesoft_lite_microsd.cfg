# cc65 linker config for Applesoft Lite — microSD flavour (DevBench, $6000).
# -----------------------------------------------------------------
# The microSD "Applesoft Lite" is the SAME interpreter as the CFFA1 flavour
# (applesoft-lite.s + io.s + cffa1.s + wozmon.s), only RELINKED at $6000 so the
# P-LAB microSD machine can boot it with 6000R. There is no separate microSD
# source — this cfg is the only difference from applesoft_lite.cfg ($E000):
#   * BASROM moves $E000 -> $6000 (interpreter body, $1F00 bytes)
#   * MONROM moves $FF00 -> $7F00 (bundled WOZ Monitor copy; unused at runtime —
#     POM1 serves its own WOZ Monitor at $FF00 — it just pads the image to 8 KB)
#
# Build (regenerates roms/applesoft-lite-microsd.rom, byte-for-byte):
#   ca65 -I . -o applesoft-lite.o applesoft-lite.s   (+ io.s cffa1.s wozmon.s)
#   ld65 -C applesoft_lite_microsd.cfg -o applesoft-lite-microsd.bin *.o
#
# The tokenizer's SETPTRS ($64EC) / NEWSTT ($6648) entry points (BasicCompiler
# targetMicrosd) come from this layout — relink at a different base and they move.
#
# NOTE on LOAD/SAVE: Applesoft's disk verbs resolve to cffa1.s (CFFALoad/Save/
# Menu); on a microSD machine (no CFFA1 card) they are inert. The microSD card's
# own storage is reached through the SD CARD OS shell ($8000), not Applesoft.

MEMORY {
    BASROM:  start = $6000, size = $1F00, fill = yes, file = %O;
    MONROM:  start = $7F00, size = $0100, fill = yes, file = %O;
}

SEGMENTS {
    BASIC:   load = BASROM, type = ro;
    MONITOR: load = MONROM, type = ro;
}
