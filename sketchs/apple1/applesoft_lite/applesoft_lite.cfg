# cc65 linker config for Applesoft Lite on POM1 (DevBench, text Apple-1).
# -----------------------------------------------------------------
# Functionally identical to the upstream replica1.cfg (txgx42/applesoft-lite):
# it links the four object modules into ONE contiguous 8 KB ROM image that
# maps $E000-$FFFF, which is exactly the canonical "CFFA1 flavour" Applesoft
# Lite that POM1 also ships prebuilt as roms/applesoft-lite-cffa1.rom and loads
# at $E000 when the CFFA1 card is plugged (see Memory::loadApplesoftLiteCFFA1).
#
#   $E000-$FEFF  BASIC   — Applesoft Lite interpreter + Apple-1 I/O (io.s) +
#                          CFFA1 LOAD/SAVE (cffa1.s).  size $1F00 = 7936 B.
#   $FF00-$FFFF  MONITOR — Steve Wozniak's Apple-1 Monitor (wozmon.s), with the
#                          RESET/NMI/IRQ vectors.  io.s calls its ECHO at $FFEF.
#
# Because $E000+$1F00 == $FF00, ld65 emits the two regions back-to-back into a
# single 8 KB file (both use `file = %O`). DevBench reads the first `%O` MEMORY
# line, so it loads + cold-starts the image at $E000 (Run = E000R).
#
# Cold/warm entry points are the first two JMPs of applesoft-lite.s: $E000
# (COLDSTART) and $E003 (RESTART / warm).
#
# Running in POM1: this is a full $E000-$FFFF ROM image, so it needs a machine
# whose $E000-$FEFF is usable RAM/ROM. The faithful environment is the CFFA1
# card (which is exactly what this build targets); the plain "Apple-1 dual
# 4K/8K" DevBench preset only backs $E000-$EFFF, not $F000-$FEFF. To run the
# floating-point BASIC out of the box, the DevBench "Applesoft Lite" BASIC
# target (Fantasy 64K, 6000R) keeps interpreting the same sources relocated to
# $6000 (roms/applesoft-lite-microsd.rom). Verify/compile here is preset-neutral.

MEMORY {
    BASROM:  start = $E000, size = $1F00, fill = yes, file = %O;
    MONROM:  start = $FF00, size = $0100, fill = yes, file = %O;
}

SEGMENTS {
    BASIC:   load = BASROM, type = ro;
    MONITOR: load = MONROM, type = ro;
}
