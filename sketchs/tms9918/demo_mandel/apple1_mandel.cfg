# cc65 linker config for TMS_Mandel — STOCK 4 KB Apple-1 + TMS9918
# -----------------------------------------------------------------
# Memory layout:
#   $0000-$004F  ZP scalars: pixel state, Q8.8 accumulators, mul scratch
#   $0100-$01FF  6502 stack
#   $0280-$0BFF  CODE + literal data (~2.4 KB available; image ~1.6 KB)
#   $0C00-$0CFF  sq_lo[256]  — page-aligned, BUILT AT BOOT
#                              (low byte of i*i for i=0..255)
#   $0D00-$0DFF  sq_hi[256]  — page-aligned, BUILT AT BOOT
#                              (high byte of i*i for i=0..255)
#   $0E00-$0FFF  free
#
# The square tables are computed at boot via the recurrence
#   i² = (i-1)² + (2i - 1)
# instead of being baked into the binary, saving 512 B of image and ~3 ms
# of build time. They drive 8x8 unsigned multiply (and 16-bit squaring,
# which is the hot path: 3 squarings per Mandelbrot iteration).
#
# Compatible with every POM1 preset that plugs the TMS9918.

MEMORY {
    ZP:    start = $0000, size = $0050, type = rw, define = yes;
    CODE:  start = $0280, size = $0980, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
