# cc65 linker config for TMS_Plasma on a STOCK 4 KB Apple 1 + TMS9918
# -----------------------------------------------------------------
# Memory layout (4 KB DRAM at $0000-$0FFF + Woz Monitor ROM):
#
#   $0000-$003F  ZP scalars + 8-sine accumulators + per-effect working
#                slots (24 B params + 8 B palette copy) + counters.
#                Project owns 64 B of ZP (was 32 B before the full
#                effect+palette table port).
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed at runtime)
#   $0280-$0BFF  program code + literal data tables (CODE segment,
#                ~2.4 KB available; image is ~1.6 KB).
#                Holds: code, sine_src (64 B), patterns (256 B),
#                       table_adds_x/y/starts_y (12 effects × 24 B),
#                       table_palette_idx (12 B), color_palettes
#                       (16 palettes × 8 B = 128 B).
#   $0C00-$0EFF  plasma_starts buffer (768 B = 24 rows × 32 cols of
#                pre-computed StillFrame). Fixed address in source,
#                NOT allocated by ld65.
#   $0F00-$0FFF  sine_table (256 B, page-aligned for abs,Y wraparound).
#                Fixed address in source, not in cfg.
#
# Stock 4 KB layout — works on the unmodified 1976 Apple-1 plus a
# P-LAB TMS9918 card. Compatible with every POM1 preset that plugs
# the TMS9918 (Parmigiani dual-bank, CodeTank, Multiplexing Fantasy).

MEMORY {
    ZP:    start = $0000, size = $0050, type = rw, define = yes;
    CODE:  start = $0280, size = $0980, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
