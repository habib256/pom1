# cc65 linker config for TMS_Plasma as a DevBench CodeTank program.
#
# DevBench flashes CODETANKDEV.rom lower bank and boots 4000R. Plasma's
# runtime buffers stay in low RAM at the absolute addresses declared in
# TMS_Plasma.asm.

MEMORY {
    ZP:    start = $0000, size = $0050, type = rw, define = yes;
    CODE:  start = $4000, size = $1000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
