# cc65 linker config for TMS_Sokoban shipped on a P-LAB CodeTank ROM
# -----------------------------------------------------------------
# Code runs in place from the CodeTank's $4000-$7FFF window. All RAM
# fits in the bare 4 KB Apple-1 footprint ($0000-$0FFF):
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0020-$009F  LEVEL_BUF (128 B, ZP-indexed — LEVELBUF segment)
#   $00A0-$00FF  free
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer)
#   $0280-$0EFF  free RAM (level decoder scratch / future BSS)
#   $0F00-$0FBF  STATE_GRID (192 B, 16x12 — STATEGRID segment, abs,X)
#   $0FC0-$0FFF  free
#   $4000-$7FFF  CodeTank ROM window (CODE segment, runs in place)
#
# Entry point: 4000R from the Woz Monitor (main: is the first label
# in .code so it lands at $4000).
#
# Same addressing discipline as the Apple-1 8K Sokoban layout, only STATEGRID moved
# from $1F00 to $0F00 to fit a 4 KB Apple-1, and CODE moved from $0280
# to $4000 to live on the CodeTank ROM.

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF: start = $0020, size = $0080, type = rw, define = yes;
    STGRID: start = $0F00, size = $00C0, type = rw, define = yes;
    CODE:   start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LEVELBUF:  load = LVLBUF, type = zp;
    STATEGRID: load = STGRID, type = bss;
    CODE:      load = CODE,   type = ro;
}
