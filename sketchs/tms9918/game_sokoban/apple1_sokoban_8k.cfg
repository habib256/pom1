# cc65 linker config for TMS_Sokoban — standalone STOCK 8 KB Apple-1 + TMS9918.
# -----------------------------------------------------------------
# Load + run from the Woz Monitor (280R). Mirrors the CodeTank cfg's
# segment discipline but keeps CODE at $0280 in low DRAM and STATE_GRID
# at $1F00 (the 8 KB Apple-1 layout documented at the top of
# TMS_Sokoban.asm):
#
#   $0000-$001F  ZP scalars (ZEROPAGE segment)
#   $0020-$009F  LEVEL_BUF (128 B, ZP-indexed — LEVELBUF segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer)
#   $0280-$1EFF  program code + RO data (CODE segment, ~7 KB window)
#   $1F00-$1FBF  STATE_GRID (192 B, 16x12 — STATEGRID segment, abs,X)
#   $1FC0-$1FFF  free
#
# Only STATEGRID moves (from $0F00 on the 4 KB CodeTank build to $1F00
# here) and CODE moves from the $4000 ROM window down to $0280 DRAM.

MEMORY {
    ZP:     start = $0000, size = $0020, type = rw, define = yes;
    LVLBUF: start = $0020, size = $0080, type = rw, define = yes;
    CODE:   start = $0280, size = $1C80, type = ro, define = yes, file = %O;
    STGRID: start = $1F00, size = $00C0, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    LEVELBUF:  load = LVLBUF, type = zp;
    CODE:      load = CODE,   type = ro;
    STATEGRID: load = STGRID, type = bss;
}
