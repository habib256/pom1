# cc65 linker config for TMS_GalagaDiag — run-in-place from $4000, mirrors the
# Galaga cartridge layout (ZP $0000-$006F, code in the CodeTank ROM window).
# No high-bank RAM needed (the probe uses 4 ZP bytes only). Boot: 4000R.
MEMORY {
    ZP:    start = $0000, size = $0070, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}
SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
