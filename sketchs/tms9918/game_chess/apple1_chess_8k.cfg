# cc65 linker config for TMS_Chess as a standalone 8 KB Apple-1 + TMS9918
# program (DevBench "Run" / headless golden render). Loads + runs at $0280.
# -----------------------------------------------------------------
# Mirrors the CodeTank segment discipline but keeps CODE in low DRAM and
# parks the two BSS pages ABOVE the code, still inside the 8 KB footprint
# ($0000-$1FFF). Build WITH -D CODETANK_BUILD so the status/help text (which
# needs the charmap font) is present; it still fits the ~6.8 KB CODE window.
#
#   $0000-$004F  ZP (ZEROPAGE)
#   $0100-$01FF  6502 stack
#   $0280-$1CFF  program code + RO data (CODE, ~6.8 KB)
#   $1D00-$1DFF  renderer BSS (this TU's scratch + plot_mode)
#   $1E00-$1EFF  engine BSS (BOARDST)
#
# Entry: 280R.

MEMORY {
    ZP:      start = $0000, size = $0050, type = rw, define = yes;
    CODE:    start = $0280, size = $1A80, type = ro, define = yes, file = %O;
    BSS:     start = $1D00, size = $0100, type = rw, define = yes;
    BOARDST: start = $1E00, size = $0100, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    CODE:     load = CODE,    type = ro;
    ENGINE:   load = CODE,    type = ro;   # chess_engine.o code segment
    BSS:      load = BSS,     type = bss;
    BOARDST:  load = BOARDST, type = bss;
}
