# cc65 linker config for TMS_Chess on a P-LAB CodeTank ROM (GAME7 lower bank).
# -----------------------------------------------------------------
# Code runs in place from the CodeTank's $4000-$7FFF window (run-in-place,
# jumper Lower -> 4000R). All RAM lives in low DRAM (<= $1FFF, the CodeTank
# 8 KB preset). The TMS9918 framebuffer is in the card's own VRAM (behind
# $CC00/$CC01), NOT main RAM, so there is no framebuffer/BSS conflict.
#
#   $0000-$004F  ZP (ZEROPAGE) - our 8 ptrs + tms9918m2 + engine ce_* slots
#   $0100-$01FF  6502 stack
#   $0200-$0BFF  free RAM
#   $0C00-$0CFF  renderer BSS (this TU's scratch + plot_mode)
#   $0D00-$0DFF  free
#   $0E00-$0EFF  engine BSS (BOARDST: board + game state + AI/search scratch)
#   $4000-$7FFF  CodeTank ROM window (CODE segment, runs in place)
#
# Entry: 4000R (main: is the first label in CODE, TMS_Chess.o linked first).

MEMORY {
    ZP:      start = $0000, size = $0050, type = rw, define = yes;
    BSS:     start = $0C00, size = $0100, type = rw, define = yes;
    BOARDST: start = $0E00, size = $0100, type = rw, define = yes;
    CODE:    start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    CODE:     load = CODE,    type = ro;
    ENGINE:   load = CODE,    type = ro;   # chess_engine.o code segment
    BSS:      load = BSS,     type = bss;
    BOARDST:  load = BOARDST, type = bss;
}
