# cc65 linker config for TMS_Galaga shipped on a P-LAB CodeTank ROM
# -----------------------------------------------------------------
# Code runs in place from the CodeTank's $4000-$7FFF window. All game
# state lives in the bare 4 KB Apple-1 RAM ($0000-$0FFF) — we only use
# the 256 B zero page (110 B of scalars).
#
#   $0000-$00FF  ZP scalars (extended ZP, ZEROPAGE segment)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer)
#   $0280-$0FFF  free RAM (no game state here — Galaga keeps everything in ZP)
#   $4000-$7FFF  CodeTank ROM window (CODE segment, runs in place)
#
# Entry point: 4000R from the Woz Monitor (main: is the first label
# emitted by ca65 inside .code, so it lands at $4000 verbatim).
#
# All `.byte` data tables (sin/cos lookups, sprite patterns, wave
# settings) live inside .code so they're served straight from ROM. The
# 6502 has no problem fetching operands from ROM at $4000; only writes
# need RAM, and the only writes Galaga issues hit zero-page variables.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
