# cc65 linker config for TMS_Split on a STOCK 4 KB Apple 1 + TMS9918
#
# The lib's tms9918_5strigger.asm declares a small BSS slot (1 byte).
# We give it a tiny RW window at the top of low DRAM ($0F80-$0FFF).
#
#   $0000-$001F  ZP scalars (project + lib's vdp_*)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Wozmon keyboard input buffer)
#   $0280-$0F7F  CODE (~3.4 KB available; image well under 1 KB)
#   $0F80-$0FFF  BSS (128 B — 1 byte used by tms9918_5strigger)

MEMORY {
    ZP:    start = $0000, size = $0020, type = rw, define = yes;
    CODE:  start = $0280, size = $0D00, type = ro, define = yes, file = %O;
    BSS:   start = $0F80, size = $0080, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    BSS:      load = BSS,  type = bss;
}
