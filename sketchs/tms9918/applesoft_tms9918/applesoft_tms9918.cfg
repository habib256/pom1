# cc65 linker config for Applesoft TMS9918 (DevBench, P-LAB TMS9918 + CodeTank).
# -----------------------------------------------------------------
# The interpreter is a CodeTank ROM cartridge: the BASIC segment runs IN PLACE
# from the $4000-$7FFF CodeTank ROM window (16 KB, 28C256 jumper = lower half),
# exactly like Tetris / LOGO V2.6 and the arcade picker. Cold-start with 4000R.
#
# Why ROM-resident? Applesoft Lite descends from Apple II's ROM Applesoft, so the
# interpreter body is ROM-clean (all self-modifying state lives in zero page +
# low RAM). Putting it in the CodeTank EEPROM, and keeping ALL pixels in the
# TMS9918's external VRAM, frees the entire RAM below the cart for the USER's
# BASIC program: HIMEM is pinned at $4000 (the cart floor) so BASIC owns
# $0801-$3FFF (~14 KB). The Bench backs this with a REAL 16 KB low-RAM machine
# ($0000-$3FFF RAM + CodeTank ROM $4000-$7FFF) — no non-physical 64 KB view — so
# it matches a buildable Apple-1 + TMS9918 + CodeTank on silicon.
#
# Target machine: POM1 preset 1 "Apple-1 TMS9918 Development Bench" (TMS9918A VDP
# $CC00/$CC01 + CodeTank 28c256 ROM daughterboard), relaxed by the Bench to a real
# 16 KB low RAM for the BASIC session. The DevBench flashes this image as a
# CodeTank dev cartridge.
#
# Runtime memory map:
#   $0000-$00FF  ZP        Applesoft + TMS plot scratch ($06-$0C, $0300 state)
#   $0100-$01FF  -         6502 stack
#   $0200-$02FF  -         WOZ Monitor / Applesoft input buffer (INPUTBUFFER)
#   $0300-$0314  -         TMS graphics state (tmsgfx.inc GST block; CSW @ $031E)
#   $0800-$3FFF  RAM       USER BASIC program + variables + strings (HIMEM=$4000)
#   $4000-$7FFF  CODE/ROM  interpreter image (this file)  <-- 4000R, CodeTank ROM
#   $CC00/$CC01  -         TMS9918 VDP data / control (all graphics live here)
#   $FF00-$FFFF  -         WOZ Monitor ROM (POM1; io.s calls ECHO at $FFEF)
#
# COLDSTART pins HIMEM at $4000 (applesoft-tms9918.s); no MONITOR segment (POM1's
# built-in WOZ Monitor at $FF00 is reused, like the GEN2 build).

MEMORY {
    # $0000-$3FFF  ZP / stack / display pages / BASIC program (set up at runtime)
    CODEROM: start = $4000, size = $4000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    BASIC:  load = CODEROM, type = ro;
}
