# cc65 linker config for TMS_Life — stock 4 KB Apple-1 + TMS9918.
# -----------------------------------------------------------------
# Standalone $0280 layout (load + run from the Woz Monitor: 280R).
#
#   $0000-$003F  ZP scalars (double-buffer row pointers, counters)
#   $0100-$01FF  6502 stack
#   $0200-$027F  free (Woz keyboard input buffer, reclaimed at runtime)
#   $0280-$0FFF  program code + data (CODE segment)
#
# TMS_Life only declares the ZEROPAGE and CODE segments (the two 32x24
# generation buffers live in TMS9918 VRAM on the card), so no BSS window
# is needed here. Compatible with every POM1 preset that plugs the
# TMS9918.

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    CODE:  start = $0280, size = $0D80, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
}
