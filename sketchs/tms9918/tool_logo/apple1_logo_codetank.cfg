# cc65 linker config for APPLE-1 LOGO V2.6 — standalone CodeTank
# run-in-place build ($4000-$7FFF upper bank). This is the cfg the
# DevBench sketch uses: the in-app TMS9918 profile is an 8 KB dual-bank
# Apple-1 + CodeTank daughterboard, so the interpreter runs from the ROM
# window at $4000 (entry 4000R) with its 4 KB PROC area in the high bank
# ($E000). The 16 KB *linear*-DRAM variant ($0280) lives in
# apple1_logo_16k.cfg and needs a real 16 KB Apple-1 (not the bench).
# Built WITHOUT -D CODETANK_BUILD: the core turtle/REPL interpreter (text
# via WozMon ECHO + turtle graphics) fits and runs; the CODETANK_BUILD
# extras (on-bitmap text_bitmap/SAY, speech bubble, buffer editor) are
# the cartridge-only superset, assembled into the GAME1 ROM separately.
# -----------------------------------------------------------------
# CodeTank upper-bank layout (this build occupies the entire half):
#
#   $4000-$xxxx  LOGO V2.0 interpreter (CODE segment, ~9.4 kB today)
#   $xxxx-$7FFF  $FF padding (up to the 16 kB cap)
#
# Apple-1 RAM layout (run-in-place from ROM, all writes hit RAM).
# The CodeTank preset uses Parmigiani's 8 kB dual-bank layout
# (4 kB at $0000-$0FFF + 4 kB at $E000-$EFFF, no BASIC), so the
# 4 kB PROC area lives in the high bank — the V2.0 control stack
# (1 kB) plus proc_table (~2.4 kB) plus var_table won't fit inside
# the low bank's $0280-$0FFF gap.
#
#   $0000-$003F  ZP scalars (ZEROPAGE segment, 64 B — V2.0 needs more
#                            ZP than V1.8's 32 B)
#   $0040-$00FF  free ZP (unused by LOGO -- available to user)
#   $0100-$01FF  6502 stack
#   $0200-$027F  LBUF: line_buf + parser scratch + small turtle state (128 B)
#   $0280-$0FFF  free RAM (low bank tail)
#   $E000-$EFFF  PROC: proc_table + control stack + var_table + params (4 kB)
#
# Entry point: 4000R from the Woz Monitor with the CodeTank board jumper
# in the Upper position. The lower jumper boots the games menu instead.

MEMORY {
    ZP:    start = $0000, size = $0040, type = rw, define = yes;
    LBUF:  start = $0200, size = $0080, type = rw, define = yes;
    CODE:  start = $4000, size = $4000, type = ro, define = yes, file = %O;
    PROC:  start = $E000, size = $1000, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    LINEBUF:  load = LBUF, type = bss;
    CODE:     load = CODE, type = ro;
    PROCBSS:  load = PROC, type = bss;
}
