# cc65 linker config for Applesoft GEN2 (DevBench, Uncle Bernie GEN2 HGR).
# -----------------------------------------------------------------
# Single contiguous interpreter image at $6000, run with 6000R.
#
# Target machine: POM1 preset 2 "Apple-1 GEN2 HGR Development Bench" (48 KB RAM
# $0000-$BFFF + $E000-$EFFF, GEN2 card plugged). The interpreter cannot live in
# the 4 KB $E000 high bank (the stock GEN2 asm layout) because it is ~9 KB AND
# the floating-point BASIC needs RAM workspace; $6000 is free 48 KB RAM and
# leaves the fixed GEN2 display pages untouched.
#
# Memory map at runtime:
#   $0000-$00FF  ZP        Applesoft + GEN2 plot scratch ($06-$0C, $50/$51)
#   $0100-$01FF  -         6502 stack
#   $0200-$02FF  -         WOZ Monitor / Applesoft input buffer (INPUTBUFFER)
#   $0300-$0315  -         GEN2 graphics state (gen2gfx.inc GST block)
#   $0400-$07FF  -         GEN2 TEXT / LO-RES page 1 (GR / PLOT / HLIN / VLIN)
#   $0800-$1FFF  -         BASIC program + variables + strings (HIMEM = $2000)
#   $2000-$3FFF  -         GEN2 HI-RES page 1 framebuffer (HGR / HPLOT)
#   $6000-....   BASIC     interpreter image (this file)  <-- 6000R
#   $FF00-$FFFF  -         WOZ Monitor ROM (POM1; io.s calls ECHO at $FFEF)
#
# COLDSTART pins HIMEM at $2000 (applesoft-gen2.s) instead of probing RAM, so
# BASIC string/variable space can never grow into the HGR framebuffer or this
# interpreter image. There is no MONITOR segment: the GEN2 build reuses POM1's
# built-in WOZ Monitor at $FF00 (the bundled wozmon.s is dropped, like the
# microSD Applesoft Lite flavour).

MEMORY {
    # $0000-$5FFF  ZP / stack / display pages / BASIC program (set up at runtime)
    BASROM: start = $6000, size = $3000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    BASIC:  load = BASROM, type = ro;
}
