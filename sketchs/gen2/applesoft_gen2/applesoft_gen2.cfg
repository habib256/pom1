# cc65 linker config for Applesoft GEN2 (DevBench, Uncle Bernie GEN2 HGR).
# -----------------------------------------------------------------
# Single contiguous interpreter image at $9800, run with 9800R.
#
# Target machine: POM1 preset 2 "Apple-1 GEN2 HGR Development Bench" (48 KB RAM
# $0000-$BFFF + $E000-$EFFF, GEN2 card plugged). The interpreter cannot live in
# the 4 KB $E000 high bank (the stock GEN2 asm layout) because it is ~10 KB AND
# the floating-point BASIC needs RAM workspace; $9800 sits high in the free
# 48 KB RAM, leaves the fixed GEN2 display pages untouched, and lets HIMEM pin
# just below it so BASIC owns the maximum span ($0801-$97FF, ~37 KB).
#
# Memory map at runtime:
#   $0000-$00FF  ZP        Applesoft + GEN2 plot scratch ($06-$0C, $50/$51)
#   $0100-$01FF  -         6502 stack
#   $0200-$02FF  -         WOZ Monitor / Applesoft input buffer (INPUTBUFFER)
#   $0300-$031C  -         GEN2 graphics state (gen2gfx.inc GST block)
#   $0400-$07FF  -         GEN2 TEXT / LO-RES page 1 (GR / PLOT / HLIN / VLIN)
#   $0800-$97FF  -         BASIC program + variables + strings (HIMEM = $9800)
#   $2000-$3FFF  -         GEN2 HI-RES page 1 framebuffer (HGR / HPLOT) — sits
#                          INSIDE the BASIC window, so HGR programs must keep
#                          program text + strings clear of $2000-$3FFF.
#   $9800-....   BASIC     interpreter image (this file)  <-- 9800R
#   $FF00-$FFFF  -         WOZ Monitor ROM (POM1; io.s calls ECHO at $FFEF)
#
# COLDSTART pins HIMEM at $9800 (applesoft-gen2.s) instead of probing RAM, so
# BASIC string/variable space can never grow into this interpreter image. There
# is no MONITOR segment: the GEN2 build reuses POM1's built-in WOZ Monitor at
# $FF00 (the bundled wozmon.s is dropped, like the microSD Applesoft Lite
# flavour).

MEMORY {
    # $0000-$97FF  ZP / stack / display pages / BASIC program (set up at runtime)
    BASROM: start = $9800, size = $2800, type = ro, define = yes, file = %O;
}

SEGMENTS {
    BASIC:  load = BASROM, type = ro;
}
