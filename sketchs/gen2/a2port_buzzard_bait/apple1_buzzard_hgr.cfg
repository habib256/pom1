# cc65 linker config for the Buzzard Bait port — POM1 DevBench (GEN2 HGR asm).
# -----------------------------------------------------------------------------
# The standalone buzzard_bait.cfg builds ONLY the main game at $0940 (it exists
# to prove the disassembly round-trips byte-identical to buzzard_bait.bin). But
# the playable port also needs the gen2_port.s shims in low RAM at $9900 (WAIT /
# keyboard-latch routines the patched game JSRs to). The shipped BuzzardBait.txt
# Woz-hex bundles BOTH regions; the DevBench reproduces that with a dual-bank
# build: ld65 emits "%O.lo" + "%O.hi", and the bench stages the .hi shims at
# $9900 then loads + runs the .lo game at $0940 (entry = CODE's load region).
#
# Memory map (48 KB Apple-1 + GEN2 card, preset 2 — "code en haut" does NOT
# apply here: this is a verbatim Apple-II BIN load, so the game keeps its
# original $0940 base and relocates its engine $2800-$3FFF -> $8000 at runtime):
#   $0940-$7BFF  CODE  game image (29 376 B, .lo file) — incl. the $2000-$3FFF
#                      framebuffer-region data + the $2800-$3FFF self-relocating
#                      engine the original BIN places there
#   $8000-$97FF  -     relocated engine + $9800 scratch (runtime only)
#   $9900-$9950  PORT  gen2_port.s shims (.hi file): mon_WAIT/kbd_read/kbd_clear
#
# Sizes match the two standalone cfgs (buzzard_bait.cfg + gen2_port.cfg) so the
# .lo/.hi bytes are identical to the round-trip-verified binaries.

MEMORY {
    CODELO: start = $0940, size = $72C0, type = ro, define = yes, fill = yes, file = "%O.lo";
    # $8000-$97FF  relocated engine target (runtime only, not in any file)
    PORTHI: start = $9900, size = $0051, type = ro, define = yes, fill = yes, fillval = $00, file = "%O.hi";
}

SEGMENTS {
    CODE: load = CODELO, type = ro;
    PORT: load = PORTHI, type = ro;
}
