# cc65 linker config for GEN2_Chess on an Apple-1 + GEN2 HGR card (48 KB RAM).
# -----------------------------------------------------------------------------
# Target: the "GEN2 HGR Color" 48 KB machine (RAM $0000-$BFFF), POM1 preset 11.
# The GEN2 card carves its two 8 KB HGR pages out of that RAM:
#   $2000-$3FFF  HGR page 1 (the one this game draws into)
#   $4000-$5FFF  HGR page 2 (unused here)
# So the program CODE sits in the contiguous RAM ABOVE page 2 ($6000+), one
# single binary (no dual-bank split). Data/BSS live in low RAM below the
# framebuffer. Entry: 6000R.
#
#   $0000-$005F  ZP (ZEROPAGE) - our 4 ptrs + tmp/tmp2 + engine ce_* slots
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer
#   $0280-$067F  BSS       (renderer + game-loop scratch)
#   $0680-$077F  BOARDST   (engine board + game state + AI/search scratch)
#   $2000-$3FFF  HGR page 1 framebuffer (written via STA, NOT a segment)
#   $4000-$5FFF  HGR page 2 (unused)
#   $6000-$BFFF  CODE + ENGINE  (~7 KB used; headroom for the 2b text panel)
#
# Entry: 6000R  (main is the first label in CODE, GEN2_Chess.o linked first).

MEMORY {
    ZP:      start = $0000, size = $0060, type = rw, define = yes;
    BSS:     start = $0280, size = $0400, type = rw, define = yes;
    BOARDST: start = $0680, size = $0100, type = rw, define = yes;
    CODE:    start = $6000, size = $6000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    CODE:     load = CODE,    type = ro;
    ENGINE:   load = CODE,    type = ro;   # chess_engine.o code segment
    BSS:      load = BSS,     type = bss;
    BOARDST:  load = BOARDST, type = bss;
}
