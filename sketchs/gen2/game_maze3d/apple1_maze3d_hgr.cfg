# cc65 linker config for HGR_Maze3D on an Apple-1 + GEN2 HGR card (48 KB RAM).
# -----------------------------------------------------------------------------
# Target: the "GEN2 HGR Color" 48 KB machine (RAM $0000-$BFFF). The GEN2 card
# carves its two 8 KB HGR pages out of that RAM:
#   $2000-$3FFF  HGR page 1 (the page this game draws into)
#   $4000-$5FFF  HGR page 2 (unused)
# The program CODE sits in the contiguous RAM above page 2 ($6000+), one
# single binary (chess model). Entry: 6000R (`main:` is the first byte of
# CODE — HGR_Maze3D.o is linked first).
#
# Game state keeps the CodeTank build's low-RAM layout (all well below the
# $2000 framebuffer):
#
#   $0000-$00FF  ZP scalars (game uses ~80 B incl. the HGR video-layer ZP)
#   $0100-$01FF  6502 stack
#   $0E00-$0E4C  GRID    (77 B — maze cells, 11x7)
#   $0E50-$0E9C  STK     (77 B — DFS backtracker stack)
#   $0EA0-$0EFF  MOBS    (96 B — monsters table)
#   $2000-$3FFF  HGR page 1 framebuffer (written via STA, NOT a segment)
#   $6000-$BFFF  CODE (~9 KB used incl. font + rev7 table; headroom to spare)

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    CODE:  start = $6000, size = $6000, type = ro, define = yes, file = %O;
    GRID:  start = $0E00, size = $0050, type = rw, define = yes;
    STK:   start = $0E50, size = $0050, type = rw, define = yes;
    MOBS:  start = $0EA0, size = $0060, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    GRIDSEG:  load = GRID, type = bss;
    STKSEG:   load = STK,  type = bss;
    MOBSEG:   load = MOBS, type = bss;
}
