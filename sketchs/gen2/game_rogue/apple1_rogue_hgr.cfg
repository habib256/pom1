# cc65 linker config for HGR_Rogue on an Apple-1 + GEN2 HGR card (48 KB RAM).
# -----------------------------------------------------------------------------
# Target: the "GEN2 HGR Color" 48 KB machine (RAM $0000-$BFFF). The GEN2 card
# carves its two 8 KB HGR pages out of that RAM:
#   $2000-$3FFF  HGR page 1 (the page this game draws into)
#   $4000-$5FFF  HGR page 2 (unused)
# So the program CODE sits in the contiguous RAM ABOVE page 2 ($6000+), one
# single binary (chess model — no dual-bank split). Entry: 6000R.
#
# The TMS9918 cartridge's Parmigiani high bank ($E000-$EFFF) does not exist on
# this machine, so MAPSEG and the three absolutely-addressed pools move to low
# RAM below the framebuffer:
#
#   $0000-$009F  ZP (game state + shadowcaster scratch + HGR video-layer ZP)
#   $0100-$01FF  6502 stack
#   $0200-$027F  Wozmon keyboard input buffer
#   $0280-$02FF  MAPSEG: map_buffer (80 B) + vis_buffer (20 B) + prev_vis (20 B)
#   $0300-$037F  monsters   16 slots x 8 B   (absolute equates in HGR_Rogue.asm)
#   $0380-$039F  items       8 slots x 4 B
#   $03A0-$046F  inventory  26 slots x 8 B
#   $0470-$1FFF  free low RAM
#   $2000-$3FFF  HGR page 1 framebuffer (written via STA, NOT a segment)
#   $6000-$BFFF  CODE (~13 KB used incl. tiles/sprites/font; headroom to spare)

MEMORY {
    ZP:    start = $0000, size = $00A0, type = rw, define = yes;
    MAP:   start = $0280, size = $0080, type = rw, define = yes;
    CODE:  start = $6000, size = $6000, type = ro, define = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    CODE:     load = CODE, type = ro;
    MAPSEG:   load = MAP,  type = bss;
}
