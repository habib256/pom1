# cc65 linker config for APPLE-1 LOGO V2.6 on the Uncle Bernie GEN2 HGR card.
# -----------------------------------------------------------------
# Target: POM1 preset 11 "Uncle Bernie GEN2 HGR Color" (48 KB RAM
# $0000-$BFFF, GEN2 card plugged). Built from the shared interpreter
# sketchs/tms9918/tool_logo/TMS_Logo_16k.asm with -D LOGO_GEN2, linked
# against dev/lib/gen2/gen2_logom2.asm instead of the TMS9918 backend.
#
# The HGR framebuffer is fixed at $2000-$3FFF, so the interpreter image and
# all of its RAM tables must stay clear of that 8 KB hole.
#
# Runtime memory map:
#   $0000-$00FF  ZP        interpreter scalars + gen2_logom2 plot/line ZP
#   $0100-$01FF  -         6502 stack
#   $0200-$027F  -         WOZ Monitor paste/input buffer (load time only)
#   $0280-$03FF  LBUF      line_buf + turtle/plot flags (LINEBUF segment)
#   $0400-$1FFF  -         free (TEXT/LORES pages, not fetched in HIRES)
#   $2000-$3FFF  -         GEN2 HGR page-1 framebuffer (RESERVED)
#   $6000-$AFFF  CODE      interpreter + backend + math + sprites + text/font
#                          + bubble + editor (full CODETANK_BUILD set)  <- 6000R
#   $B000-$BFFF  PROC      proc_table + control stack + var_table (PROCBSS)
#
# Entry: the CODE segment starts with `jmp main`, so cold-start is `6000R`.

MEMORY {
    ZP:    start = $0000, size = $0100, type = rw, define = yes;
    LBUF:  start = $0280, size = $0180, type = rw, define = yes;
    CODE:  start = $6000, size = $5000, type = ro, define = yes, file = %O;
    PROC:  start = $B000, size = $1000, type = rw, define = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    LINEBUF:  load = LBUF, type = bss;
    CODE:     load = CODE, type = ro;
    PROCBSS:  load = PROC, type = bss;
}
